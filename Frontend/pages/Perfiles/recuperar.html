<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña - Museo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f5f5f5; display:flex; justify-content:center; align-items:center; height:100vh; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight:bold; }
        .hidden { display: none; }
        p.pregunta { font-weight: bold; color: #34495e; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; margin-bottom: 20px;">Recuperar Contraseña</h2>
        
        <div id="paso1">
            <p>Ingresa tu correo electrónico para buscar tus preguntas de seguridad.</p>
            <input type="email" id="email" placeholder="correo@ejemplo.com" required>
            <button onclick="buscarPreguntas()">Siguiente</button>
            <div style="text-align:center; margin-top:15px;"><a href="../index.html">Volver al Login</a></div>
        </div>

        <div id="paso2" class="hidden">
            <p style="font-size:0.9rem; color:#666;">Responde tus preguntas de seguridad:</p>
            <div id="contenedorPreguntas"></div>
            
            <hr style="margin: 20px 0;">
            <p><strong>Crea tu nueva contraseña:</strong></p>
            <input type="password" id="nuevaPass1" placeholder="Nueva Contraseña">
            <input type="password" id="nuevaPass2" placeholder="Repite la Contraseña">
            
            <button onclick="recuperarPassword()" style="background: #27ae60; margin-top:15px;">Cambiar Contraseña</button>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
    <script>
        let preguntasUsuario = [];

        async function buscarPreguntas() {
            const email = document.getElementById('email').value;
            if(!email) return alert("Ingresa un correo");

            const res = await fetch(`${API_BASE}/usuarios/preguntas-de/${email}`);
            const data = await res.json();

            if (res.ok) {
                preguntasUsuario = data;
                let html = '';
                preguntasUsuario.forEach((p, i) => {
                    html += `<p class="pregunta">${p.pregunta_texto}</p>
                             <input type="text" id="ans${i}" placeholder="Tu respuesta">`;
                });
                document.getElementById('contenedorPreguntas').innerHTML = html;
                document.getElementById('paso1').classList.add('hidden');
                document.getElementById('paso2').classList.remove('hidden');
            } else {
                alert(data.error || "No se encontraron preguntas para este correo");
            }
        }

        async function recuperarPassword() {
            const email = document.getElementById('email').value;
            const p1 = document.getElementById('nuevaPass1').value;
            const p2 = document.getElementById('nuevaPass2').value;

            if(p1 !== p2 || !p1) return alert("Las contraseñas no coinciden o están vacías");

            const respuestas = preguntasUsuario.map((p, i) => ({
                pregunta_id: p.pregunta_id,
                respuesta: document.getElementById(`ans${i}`).value
            }));

            const res = await fetch(`${API_BASE}/usuarios/recuperar-password-externo`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, respuestas, nuevaPassword: p1 })
            });

            const data = await res.json();
            if(res.ok) {
                alert("¡Contraseña recuperada exitosamente! Ahora puedes iniciar sesión.");
                window.location.href = 'login.html';
            } else {
                alert("Error: " + data.error);
            }
        }
    </script>
</body>
</html>
