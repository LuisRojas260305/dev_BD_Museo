<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Facturación</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#ecf0f1; }
        header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .Titulo { text-decoration: none; color: white; }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:800px; margin:2rem auto; padding:0 2rem; background:white; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); padding:2rem; }
        h2 { color:#2c3e50; margin-bottom:1rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input, select { width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        input:read-only { background-color:#f0f0f0; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; margin:0.5rem 0; }
        .btn-success { background:#27ae60; }
        .resultado { background:#f9f9f9; padding:1rem; border-radius:4px; margin-top:1rem; }
        .hidden { display:none; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Titulo" href="admin-dashboard.html">🎨 Admin - Facturación</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Emitir Factura</h2>
        
        <div class="form-group">
            <label for="obraSelect">Seleccionar obra reservada</label>
            <select id="obraSelect" required>
                <option value="">-- Seleccione una obra --</option>
            </select>
        </div>

        <div id="obraInfo" class="hidden resultado">
            <h3>Datos de la obra</h3>
            <p id="obraDetalle"></p>
            <form id="facturaForm">
                <div class="form-group">
                    <label for="compradorNombre">Nombre del comprador</label>
                    <input type="text" id="compradorNombre" required>
                </div>
                <div class="form-group">
                    <label for="compradorEmail">Email del comprador</label>
                    <input type="email" id="compradorEmail" required>
                </div>
                <div class="form-group">
                    <label for="direccionEnvio">Dirección de envío</label>
                    <input type="text" id="direccionEnvio" placeholder="Calle, número, ciudad..." required>
                </div>
                <div class="form-group">
                    <label for="porcentajeGanancia">% Ganancia del museo (5-10%)</label>
                    <input type="number" id="porcentajeGanancia" min="5" max="10" step="0.1" value="7.5" required>
                </div>
                <p><strong>Precio obra:</strong> $<span id="precioObra"></span></p>
                <p><strong>IVA (16%):</strong> $<span id="iva"></span></p>
                <p><strong>Total con IVA:</strong> $<span id="totalConIva"></span></p>
                <p><strong>Ganancia museo:</strong> $<span id="gananciaMuseo"></span></p>
                <button type="submit" class="btn btn-success">Emitir factura</button>
            </form>
        </div>
        <div id="resultadoFactura" class="hidden resultado"></div>
    </div>
    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script src="../js/auth.js"></script>
    <script>
        // Si auth.js no define API_BASE, se usa un valor por defecto
        //const API_BASE = window.API_BASE || 'http://localhost:3000/api';

        // Verificar que el usuario sea administrador
        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = 'index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        let obrasReservadas = [];
        let obraSeleccionada = null;

        // Cargar obras reservadas al iniciar
        async function cargarObrasReservadas() {
            try {
                const res = await fetch(`${API_BASE}/obras?estado=Reservado`);
                if (!res.ok) throw new Error('Error al cargar obras');
                obrasReservadas = await res.json();
                console.log('Obras reservadas cargadas:', obrasReservadas);

                const select = document.getElementById('obraSelect');
                select.innerHTML = '<option value="">-- Seleccione una obra --</option>';
                obrasReservadas.forEach(o => {
                    const option = document.createElement('option');
                    option.value = o.obra_id;
                    // Mostrar información útil en el texto
                    option.textContent = `ID: ${o.obra_id} - ${o.nombre} - ${o.artista_nombre || 'Artista'} - $${o.precio_venta}`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error cargando obras reservadas:', error);
                alert('No se pudieron cargar las obras reservadas. Verifica la conexión con el backend.');
            }
        }

        // Función para actualizar cálculos (IVA, total, ganancia)
        function actualizarCalculos() {
            if (!obraSeleccionada) return;
            const precio = Number(obraSeleccionada.precio_venta);
            const porcentaje = parseFloat(document.getElementById('porcentajeGanancia').value) || 0;
            const iva = precio * 0.16;
            const total = precio + iva;
            const ganancia = precio * (porcentaje / 100);
            document.getElementById('iva').innerText = iva.toFixed(2);
            document.getElementById('totalConIva').innerText = total.toFixed(2);
            document.getElementById('gananciaMuseo').innerText = ganancia.toFixed(2);
        }

        // Evento al seleccionar obra del dropdown
        document.getElementById('obraSelect').addEventListener('change', function(e) {
            const obraId = parseInt(this.value);
            if (!obraId) {
                document.getElementById('obraInfo').classList.add('hidden');
                obraSeleccionada = null;
                return;
            }

            obraSeleccionada = obrasReservadas.find(o => o.obra_id === obraId);
            if (!obraSeleccionada) return;

            // Convertir precio a número
            obraSeleccionada.precio_venta = Number(obraSeleccionada.precio_venta);

            // Mostrar detalle de la obra
            document.getElementById('obraDetalle').innerText = `${obraSeleccionada.nombre} - ${obraSeleccionada.artista_nombre || 'Artista desconocido'} - Precio: $${obraSeleccionada.precio_venta}`;
            document.getElementById('precioObra').innerText = obraSeleccionada.precio_venta;

            // Si la obra incluye datos del comprador, precargarlos
            if (obraSeleccionada.comprador_nombre) {
                document.getElementById('compradorNombre').value = obraSeleccionada.comprador_nombre;
            } else {
                document.getElementById('compradorNombre').value = '';
            }
            if (obraSeleccionada.comprador_email) {
                document.getElementById('compradorEmail').value = obraSeleccionada.comprador_email;
            } else {
                document.getElementById('compradorEmail').value = '';
            }
            if (obraSeleccionada.comprador_direccion) {
                document.getElementById('direccionEnvio').value = obraSeleccionada.comprador_direccion;
            } else {
                document.getElementById('direccionEnvio').value = '';
            }

            actualizarCalculos();
            document.getElementById('obraInfo').classList.remove('hidden');
        });

        // Escuchar cambios en el porcentaje para recalcular
        document.getElementById('porcentajeGanancia').addEventListener('input', actualizarCalculos);

        // Evento al emitir factura
        document.getElementById('facturaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!obraSeleccionada) return;

            const compradorNombre = document.getElementById('compradorNombre').value.trim();
            const compradorEmail = document.getElementById('compradorEmail').value.trim();
            const direccion = document.getElementById('direccionEnvio').value.trim();

            if (!compradorNombre || !compradorEmail || !direccion) {
                alert('Complete todos los datos del comprador');
                return;
            }

            // Para enviar al backend, necesitamos un ID de comprador. Si la obra no trae comprador_id, podemos generar uno temporal o buscar por email.
            // Por simplicidad, usaremos el email como identificador o permitiremos que el backend lo maneje.
            // Aquí asumimos que el backend espera un comprador_id. Si no está disponible, usamos 0 o lo omitimos.
            const compradorId = obraSeleccionada.comprador_id || 0; // 0 indica que no tenemos ID

            const porcentaje = parseFloat(document.getElementById('porcentajeGanancia').value);
            const precio = obraSeleccionada.precio_venta;
            const iva = precio * 0.16;
            const total = precio + iva;
            const gananciaMuseo = precio * (porcentaje / 100);

            const facturaData = {
                obra_id: obraSeleccionada.obra_id,
                comprador_id: compradorId,
                comprador_nombre: compradorNombre,
                comprador_email: compradorEmail,
                porcentaje_ganancia: porcentaje,
                direccion_envio: direccion,
                precio_venta: precio,
                iva: iva,
                total: total,
                ganancia_museo: gananciaMuseo
            };

            try {
                const res = await authFetch(`${API_BASE}/ventas`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(facturaData)
                });

                if (!res.ok) {
                    // Si el error es 404, simulamos la facturación localmente
                    if (res.status === 404) {
                        console.warn('Endpoint /ventas no encontrado. Simulando facturación local.');
                        const facturaSimulada = {
                            venta_id: 'SIM-' + Date.now(),
                            obra_id: obraSeleccionada.obra_id,
                            comprador_id: compradorId,
                            comprador_nombre: compradorNombre,
                            fecha: new Date().toISOString(),
                            total: total,
                            ganancia_museo: gananciaMuseo,
                            porcentaje: porcentaje
                        };
                        // Guardar en localStorage para llevar un registro
                        let facturasLocales = JSON.parse(localStorage.getItem('facturasSimuladas') || '[]');
                        facturasLocales.push(facturaSimulada);
                        localStorage.setItem('facturasSimuladas', JSON.stringify(facturasLocales));
                        mostrarResultadoFactura(facturaSimulada, compradorNombre, direccion, porcentaje, total, gananciaMuseo);
                        return;
                    } else {
                        const err = await res.json();
                        throw new Error(err.error || 'Error al emitir factura');
                    }
                }

                const factura = await res.json();
                mostrarResultadoFactura(factura, compradorNombre, direccion, porcentaje, total, gananciaMuseo);

            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        function mostrarResultadoFactura(factura, compradorNombre, direccion, porcentaje, total, ganancia) {
            document.getElementById('resultadoFactura').innerHTML = `
                <h3>Factura emitida</h3>
                <p><strong>Código:</strong> ${factura.venta_id || factura.id}</p>
                <p><strong>Obra:</strong> ${obraSeleccionada.nombre}</p>
                <p><strong>Comprador:</strong> ${compradorNombre}</p>
                <p><strong>Dirección:</strong> ${direccion}</p>
                <p><strong>Fecha:</strong> ${new Date(factura.fecha || Date.now()).toLocaleDateString()}</p>
                <p><strong>Total con IVA:</strong> $${total.toFixed(2)}</p>
                <p><strong>Ganancia museo:</strong> $${ganancia.toFixed(2)} (${porcentaje}%)</p>
            `;
            document.getElementById('resultadoFactura').classList.remove('hidden');
            document.getElementById('obraInfo').classList.add('hidden');

            // Quitar la obra vendida del selector
            const select = document.getElementById('obraSelect');
            select.remove(select.selectedIndex);
            select.value = ''; // Reiniciar selección
            obraSeleccionada = null;
        }

        // Inicializar: cargar obras reservadas
        cargarObrasReservadas();

        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
