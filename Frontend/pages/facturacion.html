<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Facturación</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#ecf0f1; }
        header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .Titulo { text-decoration: none; color: white; }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:800px; margin:2rem auto; padding:0 2rem; background:white; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); padding:2rem; }
        h2 { color:#2c3e50; margin-bottom:1rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input, select { width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; margin:0.5rem 0; }
        .btn-success { background:#27ae60; }
        .resultado { background:#f9f9f9; padding:1rem; border-radius:4px; margin-top:1rem; }
        .hidden { display:none; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Titulo" href="index.html">🎨 Admin - Facturación</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Emitir Factura</h2>
        <form id="buscarForm">
            <div class="form-group">
                <label for="obraId">ID de Obra Reservada</label>
                <input type="number" id="obraId" placeholder="Ej: 1" required>
            </div>
            <button type="submit" class="btn">Buscar obra</button>
        </form>
        <div id="obraInfo" class="hidden resultado">
            <h3>Datos de la obra</h3>
            <p id="obraDetalle"></p>
            <form id="facturaForm">
                <div class="form-group">
                    <label for="comprador">Comprador (seleccionar)</label>
                    <select id="comprador" required></select>
                </div>
                <div class="form-group">
                    <label for="porcentajeGanancia">% Ganancia del museo (5-10%)</label>
                    <input type="number" id="porcentajeGanancia" min="5" max="10" step="0.1" value="7.5" required>
                </div>
                <div class="form-group">
                    <label for="direccionEnvio">Dirección de envío</label>
                    <input type="text" id="direccionEnvio" readonly>
                </div>
                <p><strong>Precio obra:</strong> $<span id="precioObra"></span></p>
                <p><strong>IVA (16%):</strong> $<span id="iva"></span></p>
                <p><strong>Total con IVA:</strong> $<span id="totalConIva"></span></p>
                <p><strong>Ganancia museo:</strong> $<span id="gananciaMuseo"></span></p>
                <button type="submit" class="btn btn-success">Emitir factura</button>
            </form>
        </div>
        <div id="resultadoFactura" class="hidden resultado"></div>
    </div>
    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script src="../js/auth.js"></script>
    <script>
        // Constante global definida en auth.js
        const API_BASE = window.API_BASE || 'http://localhost:3000/api';

        // Verificar que el usuario sea administrador
        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = 'index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        let obrasReservadas = [];
        let compradores = [];
        let obraSeleccionada = null;

        // Cargar obras reservadas al iniciar (para validar el ID ingresado)
        async function cargarObrasReservadas() {
            try {
                const res = await fetch(`${API_BASE}/obras?estado=Reservado`);
                if (!res.ok) throw new Error('Error al cargar obras');
                obrasReservadas = await res.json();
            } catch (error) {
                console.error('Error:', error);
                alert('No se pudieron cargar las obras reservadas');
            }
        }

        // Cargar compradores (usuarios) para el select
        async function cargarCompradores() {
            try {
                const res = await authFetch(`${API_BASE}/usuarios`);
                if (!res.ok) throw new Error('Error al cargar usuarios');
                compradores = await res.json();
                // Filtrar solo los que pueden comprar? En principio todos, pero podrías filtrar por tipo 'miembro' si aplica
                // Por ahora mostramos todos
                const select = document.getElementById('comprador');
                select.innerHTML = '';
                compradores.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.usuario_id;
                    option.textContent = `${c.nombre} (${c.email})`;
                    select.appendChild(option);
                });
                if (compradores.length > 0) {
                    select.value = compradores[0].usuario_id;
                    document.getElementById('direccionEnvio').value = compradores[0].direccion || '';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('No se pudieron cargar los compradores');
            }
        }

        // Evento al buscar obra
        document.getElementById('buscarForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = parseInt(document.getElementById('obraId').value);
            obraSeleccionada = obrasReservadas.find(o => o.obra_id === id);
            if (!obraSeleccionada) {
                alert('No se encontró una obra reservada con ese ID.');
                document.getElementById('obraInfo').classList.add('hidden');
                return;
            }

            // Mostrar datos de la obra
            document.getElementById('obraDetalle').innerText = `${obraSeleccionada.nombre} - ${obraSeleccionada.artista_nombre || 'Artista desconocido'} - Precio: $${obraSeleccionada.precio_venta}`;
            document.getElementById('precioObra').innerText = obraSeleccionada.precio_venta;
            const iva = obraSeleccionada.precio_venta * 0.16;
            const total = obraSeleccionada.precio_venta + iva;
            document.getElementById('iva').innerText = iva.toFixed(2);
            document.getElementById('totalConIva').innerText = total.toFixed(2);
            document.getElementById('obraInfo').classList.remove('hidden');

            // Actualizar dirección cuando cambia comprador
            const selectComprador = document.getElementById('comprador');
            selectComprador.addEventListener('change', function() {
                const compradorId = parseInt(this.value);
                const comprador = compradores.find(c => c.usuario_id === compradorId);
                document.getElementById('direccionEnvio').value = comprador ? comprador.direccion || '' : '';
            });
        });

        // Evento al emitir factura
        document.getElementById('facturaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!obraSeleccionada) return;

            const compradorId = parseInt(document.getElementById('comprador').value);
            const comprador = compradores.find(c => c.usuario_id === compradorId);
            if (!comprador) {
                alert('Seleccione un comprador válido');
                return;
            }

            const porcentaje = parseFloat(document.getElementById('porcentajeGanancia').value);
            const precio = obraSeleccionada.precio_venta;
            const iva = precio * 0.16;
            const total = precio + iva;
            const gananciaMuseo = precio * (porcentaje / 100);

            // Datos para enviar al backend
            const facturaData = {
                obra_id: obraSeleccionada.obra_id,
                comprador_id: compradorId,
                porcentaje_ganancia: porcentaje,
                direccion_envio: comprador.direccion || '',
                precio_venta: precio,
                iva: iva,
                total: total,
                ganancia_museo: gananciaMuseo
            };

            try {
                const res = await authFetch(`${API_BASE}/ventas`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(facturaData)
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Error al emitir factura');
                }
                const factura = await res.json(); // Suponiendo que devuelve la factura creada

                // Mostrar resultado
                document.getElementById('resultadoFactura').innerHTML = `
                    <h3>Factura emitida</h3>
                    <p><strong>Código:</strong> ${factura.venta_id || factura.id}</p>
                    <p><strong>Obra:</strong> ${obraSeleccionada.nombre}</p>
                    <p><strong>Comprador:</strong> ${comprador.nombre}</p>
                    <p><strong>Fecha:</strong> ${new Date(factura.fecha || Date.now()).toLocaleDateString()}</p>
                    <p><strong>Total con IVA:</strong> $${factura.total ? factura.total.toFixed(2) : total.toFixed(2)}</p>
                    <p><strong>Ganancia museo:</strong> $${factura.ganancia_museo ? factura.ganancia_museo.toFixed(2) : gananciaMuseo.toFixed(2)} (${porcentaje}%)</p>
                `;
                document.getElementById('resultadoFactura').classList.remove('hidden');
                document.getElementById('obraInfo').classList.add('hidden');

                // Opcional: actualizar la lista de obras reservadas (quitando la vendida)
                obrasReservadas = obrasReservadas.filter(o => o.obra_id !== obraSeleccionada.obra_id);

            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        // Inicializar
        Promise.all([cargarObrasReservadas(), cargarCompradores()]).catch(console.error);

        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
