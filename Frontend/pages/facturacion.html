<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Facturación</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#ecf0f1; }
        header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .Titulo {
            text-decoration: none;
            color: white;
        }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:800px; margin:2rem auto; padding:0 2rem; background:white; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); padding:2rem; }
        h2 { color:#2c3e50; margin-bottom:1rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input, select { width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; margin:0.5rem 0; }
        .btn-success { background:#27ae60; }
        .resultado { background:#f9f9f9; padding:1rem; border-radius:4px; margin-top:1rem; }
        .hidden { display:none; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Titulo" href="index.html">🎨 Admin - Facturación</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Emitir Factura</h2>
        <form id="buscarForm">
            <div class="form-group">
                <label for="obraId">ID de Obra Reservada</label>
                <input type="number" id="obraId" placeholder="Ej: 1" required>
            </div>
            <button type="submit" class="btn">Buscar obra</button>
        </form>
        <div id="obraInfo" class="hidden resultado">
            <h3>Datos de la obra</h3>
            <p id="obraDetalle"></p>
            <form id="facturaForm">
                <div class="form-group">
                    <label for="comprador">Comprador (seleccionar)</label>
                    <select id="comprador" required></select>
                </div>
                <div class="form-group">
                    <label for="porcentajeGanancia">% Ganancia del museo (5-10%)</label>
                    <input type="number" id="porcentajeGanancia" min="5" max="10" step="0.1" value="7.5" required>
                </div>
                <div class="form-group">
                    <label for="direccionEnvio">Dirección de envío</label>
                    <input type="text" id="direccionEnvio" readonly>
                </div>
                <p><strong>Precio obra:</strong> $<span id="precioObra"></span></p>
                <p><strong>IVA (16%):</strong> $<span id="iva"></span></p>
                <p><strong>Total con IVA:</strong> $<span id="totalConIva"></span></p>
                <p><strong>Ganancia museo:</strong> $<span id="gananciaMuseo"></span></p>
                <button type="submit" class="btn btn-success">Emitir factura</button>
            </form>
        </div>
        <div id="resultadoFactura" class="hidden resultado"></div>
    </div>
    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script>
        // Verificar admin
        (function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if (currentUser.role !== 'admin') { alert('Acceso no autorizado'); window.location.href='index.html'; }
            document.getElementById('userEmail').innerText = currentUser.email;
        })();

        let obras = JSON.parse(localStorage.getItem('obras') || '[]');
        let compradores = JSON.parse(localStorage.getItem('compradores') || '[]');
        let facturas = JSON.parse(localStorage.getItem('facturas') || '[]');

        let obraSeleccionada = null;

        document.getElementById('buscarForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = parseInt(document.getElementById('obraId').value);
            obraSeleccionada = obras.find(o => o.id === id && o.status === 'Reservada');
            if (!obraSeleccionada) {
                alert('No se encontró una obra reservada con ese ID.');
                document.getElementById('obraInfo').classList.add('hidden');
                return;
            }
            // Mostrar datos
            document.getElementById('obraDetalle').innerText = `${obraSeleccionada.nombre} - ${obraSeleccionada.artista} - Precio: $${obraSeleccionada.precio}`;
            document.getElementById('precioObra').innerText = obraSeleccionada.precio;
            document.getElementById('iva').innerText = (obraSeleccionada.precio * 0.16).toFixed(2);
            document.getElementById('totalConIva').innerText = (obraSeleccionada.precio * 1.16).toFixed(2);
            document.getElementById('obraInfo').classList.remove('hidden');

            // Cargar compradores en select
            const selectComprador = document.getElementById('comprador');
            selectComprador.innerHTML = '';
            compradores.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = `${c.nombre} (${c.email})`;
                selectComprador.appendChild(option);
            });

            // Actualizar dirección cuando se selecciona comprador
            selectComprador.addEventListener('change', function() {
                const compradorId = parseInt(this.value);
                const comprador = compradores.find(c => c.id === compradorId);
                document.getElementById('direccionEnvio').value = comprador ? comprador.direccion : '';
            });
            // Disparar cambio para cargar primera dirección
            if (compradores.length > 0) {
                selectComprador.value = compradores[0].id;
                document.getElementById('direccionEnvio').value = compradores[0].direccion;
            }
        });

        document.getElementById('facturaForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (!obraSeleccionada) return;

            const compradorId = parseInt(document.getElementById('comprador').value);
            const comprador = compradores.find(c => c.id === compradorId);
            if (!comprador) return;

            const porcentaje = parseFloat(document.getElementById('porcentajeGanancia').value);
            const precio = obraSeleccionada.precio;
            const iva = precio * 0.16;
            const total = precio + iva;
            const gananciaMuseo = precio * (porcentaje / 100);

            // Crear factura
            const factura = {
                id: Date.now(),
                obraId: obraSeleccionada.id,
                obraNombre: obraSeleccionada.nombre,
                compradorId: comprador.id,
                compradorNombre: comprador.nombre,
                precioObra: precio,
                iva: iva,
                total: total,
                porcentajeGanancia: porcentaje,
                gananciaMuseo: gananciaMuseo,
                fecha: new Date().toISOString(),
                direccionEnvio: comprador.direccion
            };
            facturas.push(factura);
            localStorage.setItem('facturas', JSON.stringify(facturas));

            // Cambiar estado de obra a Vendida
            obraSeleccionada.status = 'Vendida';
            localStorage.setItem('obras', JSON.stringify(obras));

            // Mostrar resultado
            document.getElementById('resultadoFactura').innerHTML = `
                <h3>Factura emitida</h3>
                <p><strong>Código:</strong> ${factura.id}</p>
                <p><strong>Obra:</strong> ${factura.obraNombre}</p>
                <p><strong>Comprador:</strong> ${factura.compradorNombre}</p>
                <p><strong>Fecha:</strong> ${new Date(factura.fecha).toLocaleDateString()}</p>
                <p><strong>Total con IVA:</strong> $${factura.total.toFixed(2)}</p>
                <p><strong>Ganancia museo:</strong> $${factura.gananciaMuseo.toFixed(2)} (${factura.porcentajeGanancia}%)</p>
            `;
            document.getElementById('resultadoFactura').classList.remove('hidden');
            document.getElementById('obraInfo').classList.add('hidden');
        });

        window.logout = function() { localStorage.removeItem('loggedIn'); localStorage.removeItem('currentUser'); window.location.href='index.html'; };

    </script>
</body>
</html>
