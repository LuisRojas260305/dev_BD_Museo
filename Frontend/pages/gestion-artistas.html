<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Artistas</title>
    <style>
        /* Estilos igual que antes, añadir algunos para vista previa de imagen */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#ecf0f1; }
        header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:1200px; margin:2rem auto; padding:0 2rem; }
        h2 { color:#2c3e50; margin-bottom:1rem; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; display:inline-block; margin:0.5rem 0; }
        .btn-danger { background:#e74c3c; }
        .btn-success { background:#27ae60; }
        table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        .form-container { background:white; padding:2rem; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:2rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input, select, textarea { width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        .hidden { display:none; }
        .Nav{
            text-decoration: none;
            color: whitesmoke;
        }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
        .foto-preview { max-width:100px; max-height:100px; margin-top:0.5rem; border:1px solid #ccc; border-radius:4px; }
        .generos-checkboxes { max-height:200px; overflow-y:auto; border:1px solid #ccc; padding:0.5rem; border-radius:4px; }
        .generos-checkboxes div { margin-bottom:0.3rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Nav" href="admin-dashboard.html">🎨 Admin - Artistas</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Gestión de Artistas</h2>
        <button class="btn btn-success" onclick="mostrarFormulario()">Nuevo Artista</button>
        <div id="formContainer" class="form-container hidden">
            <h3 id="formTitle">Nuevo Artista</h3>
            <form id="artistaForm" enctype="multipart/form-data">
                <input type="hidden" id="artistaId" name="artistaId">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido">
                </div>
                <div class="form-group">
                    <label for="nacionalidad_id">Nacionalidad</label>
                    <select id="nacionalidad_id" name="nacionalidad_id" required></select>
                </div>
                <div class="form-group">
                    <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
                </div>
                <div class="form-group">
                    <label for="biografia">Biografía</label>
                    <textarea id="biografia" name="biografia" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="foto">Foto del Artista</label>
                    <input type="file" id="foto" name="foto" accept="image/*">
                    <div id="fotoPreviewContainer">
                        <img id="fotoPreview" class="foto-preview" src="#" alt="Vista previa" style="display:none;">
                    </div>
                </div>
                <div class="form-group">
                    <label for="porcentaje_ganancia">% Ganancia</label>
                    <input type="number" id="porcentaje_ganancia" name="porcentaje_ganancia" step="0.1" min="0" max="100" value="5">
                </div>
                <div class="form-group">
                    <label>Géneros</label>
                    <div id="generosCheckboxes" class="generos-checkboxes"></div>
                </div>
                <button type="submit" class="btn btn-success">Guardar</button>
                <button type="button" class="btn btn-danger" onclick="cancelarFormulario()">Cancelar</button>
            </form>
        </div>
        <div id="artistasList">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Foto</th>
                        <th>Nombre</th>
                        <th>Nacionalidad</th>
                        <th>Géneros</th>
                        <th>% Ganancia</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaArtistas"></tbody>
            </table>
        </div>
    </div>
    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script src="../js/auth.js"></script>
    <script>
        let nacionalidades = [];
        let generos = [];
        let editId = null;
        
        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = 'index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        async function cargarNacionalidades() {
            const res = await fetch(`${API_BASE}/nacionalidad`);
            nacionalidades = await res.json();
            const select = document.getElementById('nacionalidad_id');
            select.innerHTML = '<option value="">Seleccione nacionalidad</option>';
            nacionalidades.forEach(n => {
                const option = document.createElement('option');
                option.value = n.nacionalidad_id;
                option.textContent = n.nombre;
                select.appendChild(option);
            });
        }

        async function cargarGeneros() {
            const res = await fetch(`${API_BASE}/genero`);
            generos = await res.json();
            const container = document.getElementById('generosCheckboxes');
            container.innerHTML = '';
            generos.forEach(g => {
                const div = document.createElement('div');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = g.genero_id;
                cb.id = `gen_${g.genero_id}`;
                const label = document.createElement('label');
                label.htmlFor = `gen_${g.genero_id}`;
                label.textContent = g.nombre;
                div.appendChild(cb);
                div.appendChild(label);
                container.appendChild(div);
            });
        }

        async function cargarArtistas() {
            const res = await fetch(`${API_BASE}/artistas`);
            const artistas = await res.json();
            const tbody = document.getElementById('tablaArtistas');
            tbody.innerHTML = '';
            for (const a of artistas) {
                const n = nacionalidades.find(n => n.nacionalidad_id === a.nacionalidad_id);
                const nacion = n ? n.nombre : '';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${a.artista_id}</td>
                    <td><img src="${API_BASE}/artistas/${a.artista_id}/foto" alt="foto" style="width:50px; height:50px; object-fit:cover;" onerror="this.style.display='none'"></td>
                    <td>${a.nombre} ${a.apellido || ''}</td>
                    <td>${nacion}</td>
                    <td>${a.generos || ''}</td>
                    <td>${a.porcentaje_ganancia}%</td>
                    <td>
                        <button class="btn" onclick="editarArtista(${a.artista_id})">Editar</button>
                        <button class="btn btn-danger" onclick="eliminarArtista(${a.artista_id})">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            }
        }

        window.editarArtista = async function(id) {
            try {
                const res = await fetch(`${API_BASE}/artistas/${id}`);
                const artista = await res.json();
                if (!res.ok) throw new Error(artista.error);
                
                document.getElementById('artistaId').value = artista.artista_id;
                document.getElementById('nombre').value = artista.nombre;
                document.getElementById('apellido').value = artista.apellido || '';
                document.getElementById('nacionalidad_id').value = artista.nacionalidad_id;
                document.getElementById('fecha_nacimiento').value = artista.fecha_nacimiento ? artista.fecha_nacimiento.split('T')[0] : '';
                document.getElementById('biografia').value = artista.biografia || '';
                document.getElementById('porcentaje_ganancia').value = artista.porcentaje_ganancia;
                
                // Limpiar checkboxes
                const checkboxes = document.querySelectorAll('#generosCheckboxes input[type=checkbox]');
                checkboxes.forEach(cb => cb.checked = false);
                if (artista.generos && Array.isArray(artista.generos)) {
                    const ids = artista.generos.map(g => g.genero_id);
                    checkboxes.forEach(cb => {
                        if (ids.includes(parseInt(cb.value))) cb.checked = true;
                    });
                }

                // Mostrar vista previa de la foto actual si existe
                const fotoPreview = document.getElementById('fotoPreview');
                const fotoUrl = `${API_BASE}/artistas/${id}/foto`;
                // Comprobar si la foto existe (haciendo una petición HEAD)
                fetch(fotoUrl, { method: 'HEAD' })
                    .then(res => {
                        if (res.ok) {
                            fotoPreview.src = fotoUrl;
                            fotoPreview.style.display = 'block';
                        } else {
                            fotoPreview.style.display = 'none';
                        }
                    })
                    .catch(() => fotoPreview.style.display = 'none');

                document.getElementById('formTitle').innerText = 'Editar Artista';
                document.getElementById('formContainer').classList.remove('hidden');
                editId = id;
            } catch (error) {
                alert('Error al cargar artista: ' + error.message);
            }
        };

        window.eliminarArtista = async function(id) {
            if (!confirm('¿Eliminar artista?')) return;
            try {
                const res = await authFetch(`${API_BASE}/artistas/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('Artista eliminado');
                    cargarArtistas();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (error) {
                alert('Error de conexión');
            }
        };

        document.getElementById('artistaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('nombre', document.getElementById('nombre').value);
            formData.append('apellido', document.getElementById('apellido').value || '');
            formData.append('nacionalidad_id', document.getElementById('nacionalidad_id').value);
            formData.append('fecha_nacimiento', document.getElementById('fecha_nacimiento').value || '');
            formData.append('biografia', document.getElementById('biografia').value || '');
            formData.append('porcentaje_ganancia', document.getElementById('porcentaje_ganancia').value);
            
            const fotoInput = document.getElementById('foto');
            if (fotoInput.files.length > 0) {
                formData.append('foto', fotoInput.files[0]);
            }
            
            const selectedGeneros = [];
            document.querySelectorAll('#generosCheckboxes input[type=checkbox]:checked')
                .forEach(cb => selectedGeneros.push(parseInt(cb.value)));
            // Enviar géneros como array JSON (el backend espera un array)
            formData.append('generos', JSON.stringify(selectedGeneros));

            try {
                let url = `${API_BASE}/artistas`;
                let method = 'POST';
                if (editId) {
                    url += `/${editId}`;
                    method = 'PUT';
                }
                const res = await authFetch(url, { 
                    method, 
                    body: formData 
                    // No establecer Content-Type, el navegador lo pone con boundary
                });
                if (res.ok) {
                    alert('Artista guardado');
                    cancelarFormulario();
                    cargarArtistas();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (error) {
                alert('Error de conexión');
            }
        });

        function mostrarFormulario() {
            document.getElementById('formContainer').classList.remove('hidden');
            document.getElementById('artistaForm').reset();
            document.getElementById('artistaId').value = '';
            document.getElementById('formTitle').innerText = 'Nuevo Artista';
            document.getElementById('fotoPreview').style.display = 'none';
            // Desmarcar checkboxes
            document.querySelectorAll('#generosCheckboxes input[type=checkbox]')
                .forEach(cb => cb.checked = false);
            editId = null;
        }

        function cancelarFormulario() {
            document.getElementById('formContainer').classList.add('hidden');
        }

        // Vista previa de la imagen seleccionada
        document.getElementById('foto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const fotoPreview = document.getElementById('fotoPreview');
                    fotoPreview.src = event.target.result;
                    fotoPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                document.getElementById('fotoPreview').style.display = 'none';
            }
        });

        // Inicializar: cargar nacionalidades y géneros en paralelo, luego artistas
        Promise.all([cargarNacionalidades(), cargarGeneros()]).then(() => cargarArtistas());
    </script>
</body>
</html>
