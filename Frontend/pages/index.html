<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo de Arte Contemporáneo - Inicio</title>
    <style>
        /* Estilos originales, se mantienen igual */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
        }
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 400;
        }

        .auth-links a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            transition: background-color 0.3s;
            cursor: pointer;
        }

        .auth-links .login-btn {
            background-color: #3498db;
        }

        .auth-links .logout-btn {
            background-color: #e67e22;
        }

        .auth-links .register-btn {
            background-color: #2ecc71;
        }

        .auth-links a:hover {
          
            box-shadow: #152779 0px 0px 5px;
        }

        .filters {
            background-color: white;
            padding: 1.5rem 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            min-width: 150px;
        }

        .filter-group label {
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
            color: #555;
            font-weight: 600;
        }

        .filter-group select, .filter-group input {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        .filter-group.checkbox {
            flex-direction: row;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-filter {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        .btn-filter:hover {
            background-color: #1a252f;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }

        .card-image-link {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .card-image {
            height: 200px;
            background-color: #ddd;
            background-size: cover;
            background-position: center;
        }

        .card-content {
            padding: 1.2rem;
            flex-grow: 1;
        }

        .card-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }

        .card-title a {
            text-decoration: none;
            color: #2c3e50;
        }

        .card-title a:hover {
            text-decoration: underline;
        }

        .card-artist {
            font-size: 1rem;
            color: #7f8c8d;
            margin-bottom: 0.3rem;
        }

        .card-artist a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }

        .card-artist a:hover {
            text-decoration: underline;
        }

        .card-genre {
            display: inline-block;
            background-color: #ecf0f1;
            color: #7f8c8d;
            font-size: 0.8rem;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            margin-bottom: 0.8rem;
        }

        .card-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #27ae60;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #777;
            grid-column: 1 / -1;
        }

        .Nav{
            text-decoration: none;
            color: whitesmoke;

        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
            .auth-links {
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1><a class="Nav" href="index.html">🎨 Museo de Arte Contemporáneo</a></h1>
        </div>
        <div class="auth-links" id="authLinks">
            <!-- Se llenará dinámicamente con JS -->
        </div>
    </header>

    <section class="filters">
        <div class="filter-group">
            <label for="genre">Género</label>
            <select id="genre">
                <option value="">Todos</option>
                <!-- Se llenará dinámicamente -->
            </select>
        </div>
        <div class="filter-group">
            <label for="artist">Artista</label>
            <select id="artist">
                <option value="">Todos</option>
                <!-- Se llenará dinámicamente -->
            </select>
        </div>
        <div class="filter-group checkbox">
            <input type="checkbox" id="sortByPrice">
            <label for="sortByPrice">Ordenar por precio (menor a mayor)</label>
        </div>
        <button class="btn-filter" id="applyFilters">Aplicar filtros</button>
    </section>

    <main class="gallery" id="gallery">
        <!-- Las tarjetas se generarán dinámicamente -->
    </main>

    <footer>
        <p>&copy; 2026 Museo de Arte Contemporáneo - Proyecto Final</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script>

        
        
        let generos = [];
        let artistas = [];

        // Función para actualizar botones de autenticación
        function updateAuthButtons() {
            const loggedIn = isLoggedIn();
            const user = getUser();
            const authLinksDiv = document.getElementById('authLinks');
            if (loggedIn) {
                let adminLink = '';
                if (user.tipo === 'administrador') {
                    adminLink = '<a href="Administrador/admin-dashboard.html" style="color: white; margin-left: 1rem;">Admin</a>';
                }
                authLinksDiv.innerHTML = `
                    <span style="color: white;">Bienvenido, ${user.nombre}</span>
                    <a href="Perfiles/perfil.html" style="color: white; margin-left: 1rem;">Mi perfil</a>
                    ${adminLink}
                    <a class="logout-btn" onclick="logout()">Cerrar sesión</a>
                `;
            } else {
                authLinksDiv.innerHTML = `
                    <a class="login-btn" href="Principal/login.html">Iniciar sesión</a>
                    <a class="register-btn" href="Principal/registro.html">Registrarse</a>
                `;
            }
        }

        

        // Cargar géneros para el filtro
        async function cargarGeneros() {
            try {
                const response = await fetch(`${API_BASE}/genero`);
                generos = await response.json();
                const select = document.getElementById('genre');
                generos.forEach(g => {
                    const option = document.createElement('option');
                    option.value = g.genero_id;
                    option.textContent = g.nombre;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error cargando géneros:', error);
            }
        }

        // Cargar artistas para el filtro
        async function cargarArtistas() {
            try {
                const response = await fetch(`${API_BASE}/artistas`);
                const data = await response.json();
                artistas = data; // asumiendo que devuelve array con artista_id y nombre
                const select = document.getElementById('artist');
                artistas.forEach(a => {
                    const option = document.createElement('option');
                    option.value = a.artista_id;
                    option.textContent = a.nombre + (a.apellido ? ' ' + a.apellido : '');
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error cargando artistas:', error);
            }
        }

        // Función para cargar obras con filtros
        async function cargarObras() {
            const generoId = document.getElementById('genre').value;
            const artistaId = document.getElementById('artist').value;
            const ordenar = document.getElementById('sortByPrice').checked;
            

            let url = `${API_BASE}/obras?`;
            const params = new URLSearchParams();
            if (generoId) params.append('genero_id', generoId);
            if (artistaId) params.append('artista_id', artistaId);
            if (ordenar) params.append('orden', 'precio');
            url += params.toString();

            try {
                const response = await fetch(url);
                const obras = await response.json();
                renderObras(obras);
            } catch (error) {
                console.error('Error cargando obras:', error);
            }
        }

        function renderObras(obras) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            if (obras.length === 0) {
                gallery.innerHTML = '<div class="no-results">No se encontraron obras.</div>';
                return;
            }

            obras.forEach(obra => {
                const artistaNombre = obra.artista_nombre || 'Desconocido';
                const artistaId = obra.artista_id;
                const generoNombre = obra.genero_nombre || '';
                // Construir la URL de la imagen usando el ID de la obra
                const imagenUrl = `${API_BASE}/obras/${obra.obra_id}/foto`;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <a href="Principal/detalle.html?id=${obra.obra_id}" class="card-image-link">
                        <img src="${imagenUrl}" 
                            alt="${obra.nombre}" 
                            onerror="this.onerror=null; this.src='https://via.placeholder.com/300x200?text=Sin+imagen';"
                            style="width:100%; height:200px; object-fit:cover;">
                    </a>
                    <div class="card-content">
                        <h3 class="card-title"><a href="Principal/detalle.html?id=${obra.obra_id}">${obra.nombre}</a></h3>
                        <p class="card-artist">Artista: <a href="Principal/artista.html?id=${artistaId}">${artistaNombre}</a></p>
                        <span class="card-genre">${generoNombre}</span>
                        <div class="card-price">$${obra.precio_venta.toLocaleString()}</div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // Inicialización
        updateAuthButtons();
        cargarGeneros().then(() => cargarArtistas()).then(() => cargarObras());

        // Event listeners
        document.getElementById('applyFilters').addEventListener('click', cargarObras);
    </script>
</body>
</html>
