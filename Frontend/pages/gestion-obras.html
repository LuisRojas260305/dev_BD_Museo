<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Gestión de Obras</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#ecf0f1; }
        header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:1200px; margin:2rem auto; padding:0 2rem; }
        h2 { color:#2c3e50; margin-bottom:1rem; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; display:inline-block; margin:0.5rem 0; }
        .btn-danger { background:#e74c3c; }
        .btn-success { background:#27ae60; }
        table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        .form-container { background:white; padding:2rem; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:2rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input, select, textarea { width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        .hidden { display:none; }
        .thumbnail { width:50px; height:50px; object-fit:cover; border-radius:4px; }
        .preview-image { max-width:200px; max-height:200px; margin-top:0.5rem; border:1px solid #ddd; border-radius:4px; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
        .readonly-input { background-color:#f5f5f5; cursor:not-allowed; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1>🎨 Admin - Obras</h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Gestión de Obras</h2>
        <button class="btn btn-success" onclick="mostrarFormulario()">Nueva Obra</button>
        <div id="formContainer" class="form-container hidden">
            <h3 id="formTitle">Nueva Obra</h3>
            <form id="obraForm">
                <input type="hidden" id="obraId">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label for="codigo_inventario">Código de Inventario</label>
                    <input type="text" id="codigo_inventario" required readonly class="readonly-input">
                    <small>Se genera automáticamente al seleccionar el género</small>
                </div>
                <div class="form-group">
                    <label for="artista_id">Artista</label>
                    <select id="artista_id" required></select>
                </div>
                <div class="form-group">
                    <label for="genero_id">Género</label>
                    <select id="genero_id" required onchange="onGeneroChange()"></select>
                </div>
                <div class="form-group">
                    <label for="epoca_id">Época</label>
                    <select id="epoca_id" required></select>
                </div>
                <div class="form-group">
                    <label for="precio_venta">Precio de Venta</label>
                    <input type="number" id="precio_venta" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="fecha_creacion">Fecha de Creación</label>
                    <input type="date" id="fecha_creacion" required>
                </div>
                <div class="form-group">
                    <label for="alto">Alto (cm)</label>
                    <input type="number" id="alto" step="0.01" value="0">
                </div>
                <div class="form-group">
                    <label for="ancho">Ancho (cm)</label>
                    <input type="number" id="ancho" step="0.01" value="0">
                </div>
                <div class="form-group">
                    <label for="imagen">Imagen de la obra</label>
                    <input type="file" id="imagenFile" accept="image/*">
                    <input type="hidden" id="foto_url" name="foto_url">
                    <div id="previewContainer"></div>
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" rows="3"></textarea>
                </div>
                <div id="camposEspecificos"></div>
                <button type="submit" class="btn btn-success">Guardar</button>
                <button type="button" class="btn btn-danger" onclick="cancelarFormulario()">Cancelar</button>
            </form>
        </div>
        <div id="obrasList">
            <table>
                <thead><tr><th>ID</th><th>Imagen</th><th>Nombre</th><th>Artista</th><th>Género</th><th>Precio</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody id="tablaObras"></tbody>
            </table>
        </div>
    </div>
    <footer><p>&copy; 2025 Museo de Arte Contemporáneo</p></footer>

    <script src="../js/auth.js"></script>
    <script>
        let artistas = [], generos = [], epocas = [];
        let catalogos = {
            soporte: [],
            tipoEscultura: [],
            material: [],
            tecnicaEscultura: [],
            impresion: [],
            camara: [],
            tecnicaFotografica: [],
            coccion: [],
            arcilla: [],
            modelado: [],
            esmaltado: [],
            piezaOrfebreria: [],
            metales: []
        };
        let editId = null;

        // Mapeo de géneros a prefijos para código de inventario
        const generoPrefijo = {
            1: 'PIN', // Pintura
            2: 'ESC', // Escultura
            3: 'FOT', // Fotografía
            4: 'CER', // Cerámica
            5: 'ORF'  // Orfebrería
        };

        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = 'index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        function generarCodigoInventario(generoId) {
            if (!generoId || !generoPrefijo[generoId]) return '';
            const prefijo = generoPrefijo[generoId];
            const numero = Math.floor(Math.random() * 100000).toString().padStart(5, '0');
            return `${prefijo}-${numero}`;
        }

        function onGeneroChange() {
            const generoId = document.getElementById('genero_id').value;
            if (generoId && !editId) {
                document.getElementById('codigo_inventario').value = generarCodigoInventario(generoId);
            }
            cargarCamposPorGenero();
        }

        async function cargarArtistas() {
            const res = await fetch(`${API_BASE}/artistas`);
            artistas = await res.json();
            llenarSelect('artista_id', artistas, 'artista_id', a => `${a.nombre} ${a.apellido || ''}`.trim());
        }

        async function cargarGeneros() {
            const res = await fetch(`${API_BASE}/genero`);
            generos = await res.json();
            llenarSelect('genero_id', generos, 'genero_id', 'nombre');
        }

        async function cargarEpocas() {
            const res = await fetch(`${API_BASE}/epoca`);
            epocas = await res.json();
            llenarSelect('epoca_id', epocas, 'epoca_id', 'nombre');
        }

        async function cargarCatalogo(url, key) {
            const res = await fetch(`${API_BASE}/${url}`);
            const data = await res.json();
            catalogos[key] = data;
        }

        function llenarSelect(id, items, valueKey, textKey) {
            const select = document.getElementById(id);
            select.innerHTML = '<option value="">Seleccione</option>';
            items.forEach(item => {
                const option = document.createElement('option');
                option.value = item[valueKey];
                option.textContent = typeof textKey === 'function' ? textKey(item) : item[textKey];
                select.appendChild(option);
            });
        }

        // Precarga de todos los catálogos
        Promise.all([
            cargarArtistas(),
            cargarGeneros(),
            cargarEpocas(),
            cargarCatalogo('soporte', 'soporte'),
            cargarCatalogo('tipo_escultura', 'tipoEscultura'),
            cargarCatalogo('material', 'material'),
            cargarCatalogo('tecnica_escultura', 'tecnicaEscultura'),
            cargarCatalogo('impresion', 'impresion'),
            cargarCatalogo('camara', 'camara'),
            cargarCatalogo('tecnica_fotografica', 'tecnicaFotografica'),
            cargarCatalogo('coccion', 'coccion'),
            cargarCatalogo('arcilla', 'arcilla'),
            cargarCatalogo('modelado', 'modelado'),
            cargarCatalogo('esmaltado', 'esmaltado'),
            cargarCatalogo('pieza_orfebreria', 'piezaOrfebreria'),
            cargarCatalogo('metales', 'metales')
        ]).then(() => cargarObras());

        function cargarCamposPorGenero() {
            const generoId = document.getElementById('genero_id').value;
            const contenedor = document.getElementById('camposEspecificos');
            contenedor.innerHTML = '';

            switch (generoId) {
                case '1': // Pintura
                    contenedor.innerHTML = `
                        <h4>Campos de Pintura</h4>
                        <div class="form-group">
                            <label for="soporte_id">Soporte</label>
                            <select id="soporte_id" required></select>
                        </div>
                        <div class="form-group">
                            <label for="estilos">Estilos (IDs separados por coma)</label>
                            <input type="text" id="estilos" placeholder="Ej: 1,2,3">
                        </div>
                        <div class="form-group">
                            <label for="tematicas">Temáticas (IDs separados por coma)</label>
                            <input type="text" id="tematicas" placeholder="Ej: 1,2,3">
                        </div>
                    `;
                    llenarSelect('soporte_id', catalogos.soporte, 'soporte_id', 'nombre');
                    break;
                case '2': // Escultura
                    contenedor.innerHTML = `
                        <h4>Campos de Escultura</h4>
                        <div class="form-group">
                            <label for="tipo_id">Tipo de Escultura</label>
                            <select id="tipo_id" required></select>
                        </div>
                        <div class="form-group">
                            <label for="peso">Peso (kg)</label>
                            <input type="number" id="peso" step="0.01" value="0">
                        </div>
                        <div class="form-group">
                            <label for="profundidad">Profundidad (cm)</label>
                            <input type="number" id="profundidad" step="0.01" value="0">
                        </div>
                        <div class="form-group">
                            <label for="materiales">Materiales (IDs separados por coma)</label>
                            <input type="text" id="materiales" placeholder="Ej: 1,2,3">
                        </div>
                        <div class="form-group">
                            <label for="tecnicas">Técnicas (IDs separados por coma)</label>
                            <input type="text" id="tecnicas" placeholder="Ej: 1,2,3">
                        </div>
                    `;
                    llenarSelect('tipo_id', catalogos.tipoEscultura, 'tipo_id', 'nombre');
                    break;
                case '3': // Fotografía
                    contenedor.innerHTML = `
                        <h4>Campos de Fotografía</h4>
                        <div class="form-group">
                            <label for="tiraje">Tiraje</label>
                            <input type="number" id="tiraje" value="1" min="1">
                        </div>
                        <div class="form-group">
                            <label for="obturacion">Obturación</label>
                            <input type="text" id="obturacion" required placeholder="Ej: 1/250">
                        </div>
                        <div class="form-group">
                            <label for="apertura">Apertura</label>
                            <input type="text" id="apertura" required placeholder="Ej: f/2.8">
                        </div>
                        <div class="form-group">
                            <label for="iso">ISO</label>
                            <input type="number" id="iso" required>
                        </div>
                        <div class="form-group">
                            <label for="resolucion">Resolución</label>
                            <input type="text" id="resolucion" required placeholder="Ej: 300dpi">
                        </div>
                        <div class="form-group">
                            <label for="fecha_captura">Fecha de Captura</label>
                            <input type="date" id="fecha_captura" required>
                        </div>
                        <div class="form-group">
                            <label for="impresion_id">Impresión</label>
                            <select id="impresion_id" required></select>
                        </div>
                        <div class="form-group">
                            <label for="camara_id">Cámara</label>
                            <select id="camara_id" required></select>
                        </div>
                        <div class="form-group">
                            <label for="tecnica_id">Técnica Fotográfica</label>
                            <select id="tecnica_id" required></select>
                        </div>
                    `;
                    llenarSelect('impresion_id', catalogos.impresion, 'impresion_id', 'nombre');
                    llenarSelect('camara_id', catalogos.camara, 'camara_id', 'nombre');
                    llenarSelect('tecnica_id', catalogos.tecnicaFotografica, 'tecnica_id', 'nombre');
                    break;
                case '4': // Cerámica
                    contenedor.innerHTML = `
                        <h4>Campos de Cerámica</h4>
                        <div class="form-group">
                            <label for="profundidad_ceramica">Profundidad (cm)</label>
                            <input type="number" id="profundidad_ceramica" step="0.01" value="0">
                        </div>
                        <div class="form-group">
                            <label for="diametro">Diámetro (cm)</label>
                            <input type="number" id="diametro" step="0.01" value="0">
                        </div>
                        <div class="form-group">
                            <label for="funcionalidad">Funcionalidad</label>
                            <input type="text" id="funcionalidad" value="Desconocido">
                        </div>
                        <div class="form-group">
                            <label for="coccion_id">Cocción</label>
                            <select id="coccion_id" required></select>
                        </div>
                        <div class="form-group">
                            <label for="arcilla_id">Arcilla</label>
                            <select id="arcilla_id" required></select>
                        </div>
                        <div class="form-group">
                            <label for="modelado_id">Modelado</label>
                            <select id="modelado_id" required></select>
                        </div>
                        <div class="form-group">
                            <label for="esmaltado_id">Esmaltado</label>
                            <select id="esmaltado_id" required></select>
                        </div>
                    `;
                    llenarSelect('coccion_id', catalogos.coccion, 'coccion_id', 'nombre');
                    llenarSelect('arcilla_id', catalogos.arcilla, 'arcilla_id', 'nombre');
                    llenarSelect('modelado_id', catalogos.modelado, 'modelado_id', 'nombre');
                    llenarSelect('esmaltado_id', catalogos.esmaltado, 'esmaltado_id', 'nombre');
                    break;
                case '5': // Orfebrería
                    contenedor.innerHTML = `
                        <h4>Campos de Orfebrería</h4>
                        <div class="form-group">
                            <label for="profundidad_orfebreria">Profundidad (cm)</label>
                            <input type="number" id="profundidad_orfebreria" step="0.01" value="0">
                        </div>
                        <div class="form-group">
                            <label for="diametro_orfebreria">Diámetro (cm)</label>
                            <input type="number" id="diametro_orfebreria" step="0.01" value="0">
                        </div>
                        <div class="form-group">
                            <label for="peso_orfebreria">Peso (kg)</label>
                            <input type="number" id="peso_orfebreria" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="pieza_id">Pieza</label>
                            <select id="pieza_id" required></select>
                        </div>
                        <div class="form-group">
                            <label for="metal_predominante_id">Metal Predominante</label>
                            <select id="metal_predominante_id" required></select>
                        </div>
                        <div class="form-group">
                            <label for="otros_metales">Otros Metales (IDs separados por coma)</label>
                            <input type="text" id="otros_metales" placeholder="Ej: 1,2,3">
                        </div>
                    `;
                    llenarSelect('pieza_id', catalogos.piezaOrfebreria, 'pieza_id', 'nombre');
                    llenarSelect('metal_predominante_id', catalogos.metales, 'metal_id', 'nombre');
                    break;
            }
        }

        // Subida de imagen
        document.getElementById('imagenFile').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('imagen', file);
            try {
                const res = await authFetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('foto_url').value = data.url;
                    document.getElementById('previewContainer').innerHTML = `<img src="${data.url}" class="preview-image">`;
                } else {
                    alert('Error al subir imagen: ' + data.error);
                }
            } catch (error) {
                alert('Error de conexión');
            }
        });

        async function cargarObras() {
            const res = await fetch(`${API_BASE}/obras`);
            const obras = await res.json();
            const tbody = document.getElementById('tablaObras');
            tbody.innerHTML = '';
            obras.forEach(o => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${o.obra_id}</td>
                    <td><img src="${o.foto_url || 'https://via.placeholder.com/50'}" class="thumbnail"></td>
                    <td>${o.nombre}</td>
                    <td>${o.artista_nombre}</td>
                    <td>${o.genero_nombre}</td>
                    <td>$${o.precio_venta}</td>
                    <td>${o.estado}</td>
                    <td>
                        <button class="btn" onclick="editarObra(${o.obra_id})">Editar</button>
                        <button class="btn btn-danger" onclick="eliminarObra(${o.obra_id})">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.editarObra = async function(id) {
            try {
                const res = await fetch(`${API_BASE}/obras/${id}`);
                const obra = await res.json();
                if (!res.ok) throw new Error(obra.error);
                
                document.getElementById('obraId').value = obra.obra_id;
                document.getElementById('nombre').value = obra.nombre;
                document.getElementById('codigo_inventario').value = obra.codigo_inventario;
                document.getElementById('artista_id').value = obra.artista_id;
                document.getElementById('genero_id').value = obra.genero_id;
                document.getElementById('epoca_id').value = obra.epoca_id;
                document.getElementById('precio_venta').value = obra.precio_venta;
                document.getElementById('fecha_creacion').value = obra.fecha_creacion.split('T')[0];
                document.getElementById('alto').value = obra.alto;
                document.getElementById('ancho').value = obra.ancho;
                document.getElementById('foto_url').value = obra.foto_url;
                if (obra.foto_url) {
                    document.getElementById('previewContainer').innerHTML = `<img src="${obra.foto_url}" class="preview-image">`;
                }
                document.getElementById('descripcion').value = obra.descripcion || '';

                // Cargar campos específicos según género
                cargarCamposPorGenero();

                // Rellenar campos específicos (simplificado, no se implementa la edición completa)
                // En una versión real, se deberían mapear los datos de obra.detalles a los campos.
                alert('La edición de obras no está completamente implementada. Se cargarán solo los datos básicos.');

                document.getElementById('formTitle').innerText = 'Editar Obra';
                document.getElementById('formContainer').classList.remove('hidden');
                editId = id;
            } catch (error) {
                alert('Error al cargar obra: ' + error.message);
            }
        };

        window.eliminarObra = async function(id) {
            if (!confirm('¿Eliminar obra?')) return;
            try {
                const res = await authFetch(`${API_BASE}/obras/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('Obra eliminada');
                    cargarObras();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (error) {
                alert('Error de conexión');
            }
        };

        document.getElementById('obraForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData();
            // Datos comunes
            formData.append('nombre', document.getElementById('nombre').value);
            formData.append('codigo_inventario', document.getElementById('codigo_inventario').value);
            formData.append('artista_id', document.getElementById('artista_id').value);
            formData.append('genero_id', document.getElementById('genero_id').value);
            formData.append('epoca_id', document.getElementById('epoca_id').value);
            formData.append('precio_venta', document.getElementById('precio_venta').value);
            formData.append('fecha_creacion', document.getElementById('fecha_creacion').value);
            formData.append('alto', document.getElementById('alto').value);
            formData.append('ancho', document.getElementById('ancho').value);
            formData.append('foto_url', document.getElementById('foto_url').value || '');
            formData.append('descripcion', document.getElementById('descripcion').value || '');
            formData.append('estado', 'Disponible');

            const generoId = document.getElementById('genero_id').value;

            // Datos específicos según género
            switch (generoId) {
                case '1': // Pintura
                    formData.append('soporte_id', document.getElementById('soporte_id').value);
                    const estilos = document.getElementById('estilos').value.split(',').map(s => parseInt(s.trim())).filter(Boolean);
                    const tematicas = document.getElementById('tematicas').value.split(',').map(t => parseInt(t.trim())).filter(Boolean);
                    formData.append('estilos', JSON.stringify(estilos));
                    formData.append('tematicas', JSON.stringify(tematicas));
                    break;
                case '2': // Escultura
                    formData.append('tipo_id', document.getElementById('tipo_id').value);
                    formData.append('peso', document.getElementById('peso').value);
                    formData.append('profundidad', document.getElementById('profundidad').value);
                    const materiales = document.getElementById('materiales').value.split(',').map(m => parseInt(m.trim())).filter(Boolean);
                    const tecnicas = document.getElementById('tecnicas').value.split(',').map(t => parseInt(t.trim())).filter(Boolean);
                    formData.append('materiales', JSON.stringify(materiales));
                    formData.append('tecnicas', JSON.stringify(tecnicas));
                    break;
                case '3': // Fotografía
                    formData.append('tiraje', document.getElementById('tiraje').value);
                    formData.append('obturacion', document.getElementById('obturacion').value);
                    formData.append('apertura', document.getElementById('apertura').value);
                    formData.append('iso', document.getElementById('iso').value);
                    formData.append('resolucion', document.getElementById('resolucion').value);
                    formData.append('fecha_captura', document.getElementById('fecha_captura').value);
                    formData.append('impresion_id', document.getElementById('impresion_id').value);
                    formData.append('camara_id', document.getElementById('camara_id').value);
                    formData.append('tecnica_id', document.getElementById('tecnica_id').value);
                    break;
                case '4': // Cerámica
                    formData.append('profundidad', document.getElementById('profundidad_ceramica').value);
                    formData.append('diametro', document.getElementById('diametro').value);
                    formData.append('funcionalidad', document.getElementById('funcionalidad').value);
                    formData.append('coccion_id', document.getElementById('coccion_id').value);
                    formData.append('arcilla_id', document.getElementById('arcilla_id').value);
                    formData.append('modelado_id', document.getElementById('modelado_id').value);
                    formData.append('esmaltado_id', document.getElementById('esmaltado_id').value);
                    break;
                case '5': // Orfebrería
                    formData.append('profundidad', document.getElementById('profundidad_orfebreria').value);
                    formData.append('diametro', document.getElementById('diametro_orfebreria').value);
                    formData.append('peso', document.getElementById('peso_orfebreria').value);
                    formData.append('pieza_id', document.getElementById('pieza_id').value);
                    formData.append('metal_predominante_id', document.getElementById('metal_predominante_id').value);
                    const otrosMetales = document.getElementById('otros_metales').value.split(',').map(m => parseInt(m.trim())).filter(Boolean);
                    formData.append('otros_metales', JSON.stringify(otrosMetales));
                    break;
            }

            try {
                let url = `${API_BASE}/obras`;
                let method = 'POST';
                if (editId) {
                    url += `/${editId}`;
                    method = 'PUT';
                    alert('La edición de obras no está disponible en esta versión');
                    return;
                }
                const res = await authFetch(url, {
                    method,
                    body: formData
                });
                if (res.ok) {
                    alert('Obra creada');
                    cancelarFormulario();
                    cargarObras();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (error) {
                alert('Error de conexión');
            }
        });

        function mostrarFormulario() {
            document.getElementById('formContainer').classList.remove('hidden');
            document.getElementById('obraForm').reset();
            document.getElementById('previewContainer').innerHTML = '';
            document.getElementById('foto_url').value = '';
            document.getElementById('codigo_inventario').value = '';
            editId = null;
            document.getElementById('formTitle').innerText = 'Nueva Obra';
        }

        function cancelarFormulario() {
            document.getElementById('formContainer').classList.add('hidden');
        }
    </script>
</body>
</html>
