<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Ventas</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#ecf0f1; }
        header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .Titulo {
            text-decoration: none;
            color: white;
        }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:1200px; margin:2rem auto; padding:0 2rem; }
        h2 { color:#2c3e50; margin-bottom:1rem; }
        .filters { margin-bottom:1rem; display:flex; gap:1rem; align-items:center; }
        .filters select { padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; display:inline-block; margin:0.2rem; }
        .btn-danger { background:#e74c3c; }
        .btn-success { background:#27ae60; }
        table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        .estado-reservada { color:#f39c12; font-weight:bold; }
        .estado-vendida { color:#27ae60; font-weight:bold; }
        .estado-cancelada { color:#e74c3c; font-weight:bold; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
        .modal-content { background:white; padding:2rem; border-radius:8px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto; }
        .modal h3 { margin-bottom:1rem; border-bottom:2px solid #3498db; padding-bottom:0.5rem; }
        .info-row { margin-bottom:0.5rem; display:flex; }
        .info-label { font-weight:bold; width:120px; }
        .info-value { flex:1; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Titulo" href="../admin-dashboard.html">🎨 Admin - Ventas</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Gestión de Ventas</h2>
        <div class="filters">
            <label for="estadoFiltro">Filtrar por estado:</label>
            <select id="estadoFiltro">
                <option value="">Todos</option>
                <option value="reservada">Reservada</option>
                <option value="vendida">Vendida</option>
                <option value="cancelada">Cancelada</option>
            </select>
            <button class="btn" onclick="cargarVentas()">Aplicar</button>
        </div>
        <div id="ventasList">
            <table>
                <thead>
                    <tr>
                        <th>ID Venta</th>
                        <th>Obra</th>
                        <th>Artista</th>
                        <th>Comprador</th>
                        <th>Estado</th>
                        <th>Fecha Reserva</th>
                        <th>Fecha Venta</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaVentas"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal para detalles -->
    <div id="detalleModal" class="modal">
        <div class="modal-content">
            <h3>Detalles de la Venta</h3>
            <div id="detalleInfo"></div>
            <button class="btn" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script src="../../../js/auth.js"></script>
    <script>
        // Verificar admin
        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = '../../index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        let ventas = [];

        async function cargarVentas() {
            const estado = document.getElementById('estadoFiltro').value;
            let url = `${API_BASE}/ventas`;
            if (estado) {
                url += `?estado=${estado}`;
            }
            try {
                const res = await authFetch(url);
                if (!res.ok) throw new Error('Error al cargar ventas');
                ventas = await res.json();
                renderVentas();
            } catch (error) {
                console.error(error);
                alert('No se pudieron cargar las ventas');
            }
        }

        function renderVentas() {
            const tbody = document.getElementById('tablaVentas');
            tbody.innerHTML = '';
            ventas.forEach(v => {
                const tr = document.createElement('tr');
                let estadoClass = '';
                if (v.estado === 'reservada') estadoClass = 'estado-reservada';
                else if (v.estado === 'vendida') estadoClass = 'estado-vendida';
                else if (v.estado === 'cancelada') estadoClass = 'estado-cancelada';

                const fechaVenta = v.fecha_venta ? new Date(v.fecha_venta).toLocaleDateString() : '-';
                const fechaReserva = new Date(v.fecha_reserva).toLocaleDateString();

                tr.innerHTML = `
                    <td>${v.venta_id}</td>
                    <td>${v.obra_nombre}</td>
                    <td>${v.artista_nombre}</td>
                    <td>${v.comprador_nombre} (${v.comprador_email})</td>
                    <td class="${estadoClass}">${v.estado}</td>
                    <td>${fechaReserva}</td>
                    <td>${fechaVenta}</td>
                    <td>
                        <button class="btn" onclick="verDetalle(${v.venta_id})">Ver</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.verDetalle = function(id) {
            const venta = ventas.find(v => v.venta_id === id);
            if (!venta) return;

            const info = `
                <div class="info-row"><span class="info-label">ID Venta:</span><span class="info-value">${venta.venta_id}</span></div>
                <div class="info-row"><span class="info-label">Obra:</span><span class="info-value">${venta.obra_nombre}</span></div>
                <div class="info-row"><span class="info-label">Artista:</span><span class="info-value">${venta.artista_nombre}</span></div>
                <div class="info-row"><span class="info-label">Comprador:</span><span class="info-value">${venta.comprador_nombre} (${venta.comprador_email})</span></div>
                <div class="info-row"><span class="info-label">Estado:</span><span class="info-value">${venta.estado}</span></div>
                <div class="info-row"><span class="info-label">Fecha reserva:</span><span class="info-value">${new Date(venta.fecha_reserva).toLocaleString()}</span></div>
                <div class="info-row"><span class="info-label">Fecha venta:</span><span class="info-value">${venta.fecha_venta ? new Date(venta.fecha_venta).toLocaleString() : '-'}</span></div>
                <div class="info-row"><span class="info-label">Precio obra:</span><span class="info-value">$${venta.precio_venta}</span></div>
            `;
            document.getElementById('detalleInfo').innerHTML = info;
            document.getElementById('detalleModal').style.display = 'flex';
        };

        window.cerrarModal = function() {
            document.getElementById('detalleModal').style.display = 'none';
        };

        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };

        cargarVentas();
    </script>
</body>
</html>
