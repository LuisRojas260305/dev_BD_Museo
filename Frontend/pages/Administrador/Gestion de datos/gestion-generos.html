<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Géneros</title>
    <style>
        /* mismos estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
        }
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .Titulo {
            text-decoration: none;
            color: white;
        }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:800px; margin:2rem auto; padding:0 2rem; }
        h2 { color:#2c3e50; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; display:inline-block; margin:0.5rem 0; }
        .btn-danger { background:#e74c3c; }
        .btn-success { background:#27ae60; }
        table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        .form-container { background:white; padding:2rem; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:2rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input, textarea { width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        .hidden { display:none; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Titulo" href="../admin-dashboard.html">🎨 Admin - Géneros</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Gestión de Géneros</h2>
        <button class="btn btn-success" onclick="mostrarFormulario()">Nuevo Género</button>
        <div id="formContainer" class="form-container hidden">
            <h3 id="formTitle">Nuevo Género</h3>
            <form id="generoForm">
                <input type="hidden" id="generoId">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" rows="3"></textarea>
                </div>
                <!-- Podríamos añadir un campo de comentario si se desea -->
                <button type="submit" class="btn btn-success">Guardar</button>
                <button type="button" class="btn btn-danger" onclick="cancelarFormulario()">Cancelar</button>
            </form>
        </div>
        <div id="generosList">
            <table>
                <thead><tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr></thead>
                <tbody id="tablaGeneros"></tbody>
            </table>
        </div>
    </div>
    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script src="../../../js/auth.js"></script>
    <script>
        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = '../../index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        let generos = [];
        const tbody = document.getElementById('tablaGeneros');
        const formContainer = document.getElementById('formContainer');
        const generoForm = document.getElementById('generoForm');
        const formTitle = document.getElementById('formTitle');
        let editId = null;

        async function cargarGeneros() {
            try {
                const res = await fetch(`${API_BASE}/genero`);
                if (!res.ok) throw new Error('Error al cargar géneros');
                generos = await res.json();
                renderGeneros();
            } catch (error) {
                console.error(error);
                alert('No se pudieron cargar los géneros');
            }
        }

        function renderGeneros() {
            tbody.innerHTML = '';
            generos.forEach(g => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${g.genero_id}</td>
                    <td>${g.nombre}</td>
                    <td>${g.descripcion || ''}</td>
                    <td>
                        <button class="btn" onclick="editarGenero(${g.genero_id})">Editar</button>
                        <button class="btn btn-danger" onclick="eliminarGenero(${g.genero_id})">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function mostrarFormulario(genero = null) {
            formContainer.classList.remove('hidden');
            if (genero) {
                formTitle.innerText = 'Editar Género';
                document.getElementById('generoId').value = genero.genero_id;
                document.getElementById('nombre').value = genero.nombre;
                document.getElementById('descripcion').value = genero.descripcion || '';
                editId = genero.genero_id;
            } else {
                formTitle.innerText = 'Nuevo Género';
                generoForm.reset();
                document.getElementById('generoId').value = '';
                editId = null;
            }
        }

        function cancelarFormulario() {
            formContainer.classList.add('hidden');
        }

        generoForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const generoData = {
                nombre: document.getElementById('nombre').value,
                descripcion: document.getElementById('descripcion').value || null
                // Si quisieras comentario, añádelo aquí
            };

            try {
                let url = `${API_BASE}/genero`;
                let method = 'POST';
                if (editId) {
                    url += `/${editId}`;
                    method = 'PUT';
                }
                const res = await authFetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(generoData)
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Error al guardar');
                }
                alert(editId ? 'Género actualizado' : 'Género creado');
                cancelarFormulario();
                cargarGeneros();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        window.editarGenero = async function(id) {
            try {
                const res = await fetch(`${API_BASE}/genero/${id}`);
                if (!res.ok) throw new Error('No se pudo obtener el género');
                const genero = await res.json();
                mostrarFormulario(genero);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.eliminarGenero = async function(id) {
            if (!confirm('¿Eliminar género?')) return;
            try {
                const res = await authFetch(`${API_BASE}/genero/${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error);
                }
                alert('Género eliminado');
                cargarGeneros();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };

        cargarGeneros();
    </script>
</body>
</html>
