<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Usuarios</title>
    <style>
        /* mismos estilos */
       * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
        }
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .Titulo {
            text-decoration: none;
            color: white;
        }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:1000px; margin:2rem auto; padding:0 2rem; }
        h2 { color:#2c3e50; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; display:inline-block; margin:0.5rem 0; }
        .btn-danger { background:#e74c3c; }
        .btn-success { background:#27ae60; }
        .btn-warning { background:#f39c12; }
        table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        .form-container { background:white; padding:2rem; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:2rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input, select { width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        .hidden { display:none; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a class="Titulo" href="../admin-dashboard.html"><h1>🎨 Admin - Usuarios</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Gestión de Usuarios</h2>
        <button class="btn btn-success" onclick="mostrarFormulario()">Nuevo Usuario</button>
        <div id="formContainer" class="form-container hidden">
            <h3 id="formTitle">Nuevo Usuario</h3>
            <form id="usuarioForm">
                <input type="hidden" id="usuarioId">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="text" id="password" required>
                </div>
                <div class="form-group">
                    <label for="tipo">Rol</label>
                    <select id="tipo" required>
                        <option value="usuario">Usuario</option>
                        <option value="administrador">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success">Guardar</button>
                <button type="button" class="btn btn-danger" onclick="cancelarFormulario()">Cancelar</button>
            </form>
        </div>
        <div id="usuariosList">
            <table>
                <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Tipo</th><th>Acciones</th></tr></thead>
                <tbody id="tablaUsuarios"></tbody>
            </table>
        </div>
    </div>
    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script src="../../../js/auth.js"></script>
    <script>
        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = '../../index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        let usuarios = [];
        const tbody = document.getElementById('tablaUsuarios');
        const formContainer = document.getElementById('formContainer');
        const usuarioForm = document.getElementById('usuarioForm');
        const formTitle = document.getElementById('formTitle');
        let editId = null;

        async function cargarUsuarios() {
            try {
                const res = await authFetch(`${API_BASE}/usuarios`);
                if (!res.ok) throw new Error('Error al cargar usuarios');
                usuarios = await res.json();
                renderUsuarios();
            } catch (error) {
                console.error(error);
                alert('No se pudieron cargar los usuarios');
            }
        }

        function renderUsuarios() {
            tbody.innerHTML = '';
            usuarios.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${u.usuario_id}</td>
                    <td>${u.nombre} ${u.apellido || ''}</td>
                    <td>${u.email}</td>
                    <td>${u.tipo}</td>
                    <td>
                        <button class="btn" onclick="editarUsuario(${u.usuario_id})">Editar</button>
                        ${u.tipo === 'administrador' 
                            ? `<button class="btn btn-warning" onclick="cambiarRol(${u.usuario_id}, 'usuario')">Quitar admin</button>` 
                            : `<button class="btn btn-success" onclick="cambiarRol(${u.usuario_id}, 'administrador')">Hacer admin</button>`
                        }
                        <button class="btn btn-danger" onclick="eliminarUsuario(${u.usuario_id})">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function mostrarFormulario(usuario = null) {
            formContainer.classList.remove('hidden');
            if (usuario) {
                formTitle.innerText = 'Editar Usuario';
                document.getElementById('usuarioId').value = usuario.usuario_id;
                document.getElementById('nombre').value = usuario.nombre;
                document.getElementById('apellido').value = usuario.apellido || '';
                document.getElementById('email').value = usuario.email;
                document.getElementById('password').value = ''; // No se muestra la contraseña
                document.getElementById('tipo').value = usuario.tipo;
                editId = usuario.usuario_id;
            } else {
                formTitle.innerText = 'Nuevo Usuario';
                usuarioForm.reset();
                document.getElementById('usuarioId').value = '';
                editId = null;
            }
        }

        function cancelarFormulario() {
            formContainer.classList.add('hidden');
        }

        usuarioForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const usuarioData = {
                nombre: document.getElementById('nombre').value,
                apellido: document.getElementById('apellido').value || null,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                tipo: document.getElementById('tipo').value
            };

            try {
                let url = `${API_BASE}/usuarios`;
                let method = 'POST';
                if (editId) {
                    url += `/${editId}`;
                    method = 'PUT';
                }
                const res = await authFetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(usuarioData)
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Error al guardar');
                }
                alert(editId ? 'Usuario actualizado' : 'Usuario creado');
                cancelarFormulario();
                cargarUsuarios();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        window.editarUsuario = async function(id) {
            try {
                const res = await authFetch(`${API_BASE}/usuarios/${id}`);
                if (!res.ok) throw new Error('No se pudo obtener el usuario');
                const usuario = await res.json();
                mostrarFormulario(usuario);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.cambiarRol = async function(id, nuevoTipo) {
            if (!confirm(`¿Cambiar rol del usuario a ${nuevoTipo}?`)) return;

            try {
                // Primero obtener los datos actuales del usuario
                const resGet = await authFetch(`${API_BASE}/usuarios/${id}`);
                if (!resGet.ok) throw new Error('No se pudo obtener el usuario');
                const usuario = await resGet.json();

                // Luego enviar la actualización con todos los datos (excepto password)
                const res = await authFetch(`${API_BASE}/usuarios/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre: usuario.nombre,
                        apellido: usuario.apellido,
                        email: usuario.email,
                        tipo: nuevoTipo
                        // No enviamos password para no cambiarla
                    })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error);
                }
                alert('Rol actualizado correctamente');
                cargarUsuarios();
            } catch (error) {
                alert('Error al cambiar rol: ' + error.message);
            }
        };

        window.eliminarUsuario = async function(id) {
            if (!confirm('¿Eliminar usuario?')) return;
            try {
                const res = await authFetch(`${API_BASE}/usuarios/${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error);
                }
                alert('Usuario eliminado');
                cargarUsuarios();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };

        cargarUsuarios();
    </script>
</body>
</html>
