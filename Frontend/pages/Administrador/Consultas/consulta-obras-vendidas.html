<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Obras Vendidas</title>
    <style>
        /* mismos estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
        }
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .Titulo {
            text-decoration: none;
            color: white;
        }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:1000px; margin:2rem auto; padding:0 2rem; }
        h2 { color:#2c3e50; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input { padding:0.5rem; border:1px solid #ccc; border-radius:4px; width:200px; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; }
        table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-top:1rem; }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Titulo" href="../admin-dashboard.html">🎨 Admin - Obras Vendidas</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Consulta de Obras Vendidas por Período</h2>
        <form id="periodoForm">
            <div class="form-group">
                <label for="fechaInicio">Fecha inicio</label>
                <input type="date" id="fechaInicio" required>
            </div>
            <div class="form-group">
                <label for="fechaFin">Fecha fin</label>
                <input type="date" id="fechaFin" required>
            </div>
            <button type="submit" class="btn">Consultar</button>
        </form>
        <div id="resultado">
            <table>
                <thead><tr><th>Factura</th><th>Obra</th><th>Comprador</th><th>Fecha</th><th>Precio</th><th>Total + IVA</th></tr></thead>
                <tbody id="tablaVentas"></tbody>
            </table>
        </div>
    </div>
    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script src="../../../js/auth.js"></script>
    <script>
        // Verificar administrador
        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = '../../index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        // Función para formatear fecha (YYYY-MM-DD a objeto Date)
        function parseFechaLocal(fechaStr) {
            const [year, month, day] = fechaStr.split('-').map(Number);
            return new Date(year, month - 1, day);
        }

        // Evento del formulario
        document.getElementById('periodoForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fechaInicio = document.getElementById('fechaInicio').value;
            const fechaFin = document.getElementById('fechaFin').value;

            if (!fechaInicio || !fechaFin) {
                alert('Debe seleccionar ambas fechas');
                return;
            }

            // Construir URL con filtros: estado=vendida + fechas (si el backend las soporta)
            const params = new URLSearchParams({
                estado: 'vendida',          // <-- Solo ventas vendidas
                desde: fechaInicio,
                hasta: fechaFin
            });

            try {
                const response = await authFetch(`${API_BASE}/ventas?${params}`);
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Error al obtener ventas');
                }
                const ventas = await response.json();

                // Si el backend no filtró por fechas, podemos filtrar manualmente:
                const inicio = parseFechaLocal(fechaInicio);
                const fin = parseFechaLocal(fechaFin);
                fin.setHours(23, 59, 59, 999);

                const filtradas = ventas.filter(v => {
                    // Asegurar que solo se consideren las vendidas (por si acaso)
                    if (v.estado !== 'vendida') return false;
                    const fechaVenta = v.fecha_venta ? new Date(v.fecha_venta) : null;
                    return fechaVenta && fechaVenta >= inicio && fechaVenta <= fin;
                });

                renderVentas(filtradas);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tablaVentas').innerHTML = `<tr><td colspan="6" style="color:#e74c3c;">Error: ${error.message}</td></tr>`;
            }
        });

        function renderVentas(ventas) {
            const tbody = document.getElementById('tablaVentas');
            tbody.innerHTML = '';

            if (!ventas || ventas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">No hay ventas en el período</td></tr>';
                return;
            }

            ventas.forEach(v => {
                // Depuración: mira la consola para ver la estructura real
                console.log('Venta:', v);

                // ID de la venta/factura
                const id = v.venta_id || v.id || v.factura_id || 'N/A';

                // Nombre de la obra
                const obra = v.obra_nombre || v.nombre_obra || 'N/A';

                // Nombre del comprador
                const comprador = v.comprador_nombre || v.nombre_comprador || 'N/A';

                // Fecha: usar fecha_venta (para vendidas)
                let fechaStr = 'Fecha no disponible';
                if (v.fecha_venta) {
                    fechaStr = new Date(v.fecha_venta).toLocaleDateString();
                } else if (v.fecha_emision) {
                    fechaStr = new Date(v.fecha_emision).toLocaleDateString();
                } else if (v.fecha) {
                    fechaStr = new Date(v.fecha).toLocaleDateString();
                }

                // Precio de la obra (sin IVA) - en gestión de ventas es precio_venta
                let precio = 0;
                if (v.precio_venta !== undefined) {
                    precio = Number(v.precio_venta);
                } else if (v.precio_obra !== undefined) {
                    precio = Number(v.precio_obra);
                } else if (v.precio !== undefined) {
                    precio = Number(v.precio);
                }
                const precioStr = isNaN(precio) ? 'N/A' : `$${precio.toFixed(2)}`;

                // Total con IVA (asumimos 16% si no viene del backend)
                let total = 0;
                if (v.total !== undefined) {
                    total = Number(v.total);
                } else if (v.total_con_iva !== undefined) {
                    total = Number(v.total_con_iva);
                } else if (!isNaN(precio)) {
                    total = precio * 1.16;  // 16% de IVA
                }
                const totalStr = isNaN(total) ? 'N/A' : `$${total.toFixed(2)}`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${id}</td>
                    <td>${obra}</td>
                    <td>${comprador}</td>
                    <td>${fechaStr}</td>
                    <td>${precioStr}</td>
                    <td>${totalStr}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Función de logout
        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
