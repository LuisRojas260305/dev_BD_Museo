<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Resumen de Membresías</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
        }
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .Titulo {
            text-decoration: none;
            color: white;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 400;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .logout-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
        }
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }
        input[type="date"] {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 200px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: 1rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        tfoot {
            font-weight: bold;
            background-color: #ecf0f1;
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1><a class="Titulo" href="../admin-dashboard.html">🎨 Admin - Resumen de Membresías</a></h1>
        </div>
        <div class="user-info">
            <span id="userEmail"></span>
            <a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a>
        </div>
    </header>

    <div class="container">
        <h2>Resumen de Membresías por Período</h2>
        <form id="periodoForm">
            <div class="form-group">
                <label for="fechaInicio">Fecha inicio</label>
                <input type="date" id="fechaInicio" required>
            </div>
            <div class="form-group">
                <label for="fechaFin">Fecha fin</label>
                <input type="date" id="fechaFin" required>
            </div>
            <button type="submit" class="btn">Consultar</button>
        </form>

        <div id="resultado">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Fecha de registro</th>
                        <th>Código de seguridad</th>
                    </tr>
                </thead>
                <tbody id="tablaMembresias"></tbody>
                <tfoot id="totalMembresias"></tfoot>
            </table>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Museo de Arte Contemporáneo</p>
    </footer>

    <script src="../../../js/auth.js"></script>
    <script>
       

        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = '../../index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        document.getElementById('periodoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fechaInicio = document.getElementById('fechaInicio').value;
            const fechaFin = document.getElementById('fechaFin').value;

            if (!fechaInicio || !fechaFin) {
                alert('Debe seleccionar ambas fechas');
                return;
            }

            const params = new URLSearchParams({
                desde: fechaInicio,
                hasta: fechaFin,
                tipo: 'miembro' // Asumiendo que el backend puede filtrar por tipo
            });

            try {
                const res = await authFetch(`${API_BASE}/usuarios?${params}`);
                if (!res.ok) throw new Error('Error al obtener usuarios');
                const miembros = await res.json();
                renderMembresias(miembros);
            } catch (error) {
                console.error(error);
                document.getElementById('tablaMembresias').innerHTML = `<tr><td colspan="4" style="color:#e74c3c;">Error: ${error.message}</td></tr>`;
                document.getElementById('totalMembresias').innerHTML = '';
            }
        });

        function renderMembresias(miembros) {
            const tbody = document.getElementById('tablaMembresias');
            tbody.innerHTML = '';

            if (miembros.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No hay membresías en el período</td></tr>';
                document.getElementById('totalMembresias').innerHTML = '';
                return;
            }

            miembros.forEach(m => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${m.nombre}</td>
                    <td>${m.email}</td>
                    <td>${new Date(m.fecha_registro).toLocaleDateString()}</td>
                    <td>${m.codigo_seguridad || 'N/A'}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalMembresias').innerHTML = `
                <tr><td colspan="3" style="text-align:right;">Total de membresías:</td><td>${miembros.length}</td></tr>
            `;
        }

        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../../index.html';
        };
    </script>
</body>
</html>
