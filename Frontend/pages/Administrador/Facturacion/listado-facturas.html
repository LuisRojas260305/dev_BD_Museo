<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Facturas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
        }
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:1200px; margin:2rem auto; padding:0 2rem; background:white; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); padding:2rem; }
        h2 { color:#2c3e50; margin-bottom:1rem; }
        .filters { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; align-items:flex-end; }
        .filter-group { display:flex; flex-direction:column; }
        .filter-group label { font-size:0.9rem; font-weight:600; color:#555; margin-bottom:0.2rem; }
        .filter-group input { padding:0.5rem; border:1px solid #ccc; border-radius:4px; width:200px; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; }
        .btn:hover { background:#2980b9; }
        table { width:100%; border-collapse:collapse; margin-top:1rem; }
        th, td { padding:0.8rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        tr:hover { background:#f5f5f5; }
        .btn-small { padding:0.3rem 0.6rem; font-size:0.9rem; background:#2ecc71; }
        .btn-small:hover { background:#27ae60; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:white; padding:2rem; border-radius:8px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; }
        .modal-content h3 { margin-bottom:1rem; }
        .modal-content p { margin:0.5rem 0; }
        .close { float:right; font-size:1.5rem; cursor:pointer; }
        .hidden { display:none; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
        @media (max-width:768px) { .filters { flex-direction:column; align-items:stretch; } }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Nav" href="../admin-dashboard.html" style="text-decoration:none; color:white;">🎨 Admin - Facturas</a></h1></div>
        <div class="user-info">
            <span id="bienvenida"></span>
            <a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a>
        </div>
    </header>

    <div class="container">
        <h2>Listado de Facturas</h2>

        <!-- Filtros (opcional, por ahora sin funcionalidad) -->
        <div class="filters">
            <div class="filter-group">
                <label for="fechaInicio">Fecha desde</label>
                <input type="date" id="fechaInicio">
            </div>
            <div class="filter-group">
                <label for="fechaFin">Fecha hasta</label>
                <input type="date" id="fechaFin">
            </div>
            <button class="btn" onclick="cargarFacturas()">Aplicar filtros</button>
        </div>

        <!-- Tabla de facturas -->
        <div style="overflow-x:auto;">
            <table id="tablaFacturas">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Obra</th>
                        <th>Comprador</th>
                        <th>Fecha</th>
                        <th>Total</th>
                        <th>Ganancia Museo</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="facturasBody">
                    <tr><td colspan="7" style="text-align:center;">Cargando facturas...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para detalles de factura -->
    <div id="modalFactura" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h3 id="modalTitulo">Detalle de Factura</h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer><p>&copy; 2025 Museo de Arte Contemporáneo</p></footer>

    <script src="../../../js/auth.js"></script>
    <script>
        // Verificar administrador
        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = '../../index.html';
            }
            document.getElementById('bienvenida').innerText = `Bienvenido, ${user.nombre}`;
        })();

        // Cargar facturas
        async function cargarFacturas() {
            // Por ahora no usamos filtros de fecha, pero se pueden añadir después
            const url = `${API_BASE}/ventas/facturas`;

            try {
                const res = await authFetch(url);
                if (!res.ok) throw new Error('Error al cargar facturas');
                const facturas = await res.json();
                renderFacturas(facturas);
            } catch (error) {
                console.error(error);
                document.getElementById('facturasBody').innerHTML = `<tr><td colspan="7" style="color:#e74c3c;">Error: ${error.message}</td></tr>`;
            }
        }

        function renderFacturas(facturas) {
            const tbody = document.getElementById('facturasBody');
            if (!facturas || facturas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay facturas para mostrar</td></tr>';
                return;
            }

            let html = '';
            facturas.forEach(f => {
                const fecha = new Date(f.fecha_emision).toLocaleDateString();
                const total = Number(f.total).toFixed(2);
                const ganancia = Number(f.ganancia_museo).toFixed(2);
                html += `
                    <tr>
                        <td>${f.factura_id}</td>
                        <td>${f.obra_nombre || 'N/A'}</td>
                        <td>${f.comprador_nombre || 'N/A'}</td>
                        <td>${fecha}</td>
                        <td>$${total}</td>
                        <td>$${ganancia}</td>
                        <td><button class="btn btn-small" onclick="verDetalle(${f.factura_id})">Ver</button></td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Ver detalle de factura
        async function verDetalle(id) {
            try {
                const res = await authFetch(`${API_BASE}/ventas/facturas/${id}`);
                if (!res.ok) throw new Error('No se pudo obtener el detalle');
                const factura = await res.json();

                const modalBody = document.getElementById('modalBody');
                modalBody.innerHTML = `
                    <p><strong>Factura ID:</strong> ${factura.factura_id}</p>
                    <p><strong>Venta ID:</strong> ${factura.venta_id}</p>
                    <p><strong>Obra:</strong> ${factura.obra_nombre}</p>
                    <p><strong>Artista:</strong> ${factura.artista_nombre}</p>
                    <p><strong>Comprador:</strong> ${factura.comprador_nombre} (${factura.comprador_email})</p>
                    <p><strong>Dirección envío:</strong> ${factura.direccion_envio}</p>
                    <p><strong>Fecha emisión:</strong> ${new Date(factura.fecha_emision).toLocaleString()}</p>
                    <p><strong>Precio obra:</strong> $${Number(factura.precio_obra).toFixed(2)}</p>
                    <p><strong>IVA (16%):</strong> $${Number(factura.iva).toFixed(2)}</p>
                    <p><strong>Total con IVA:</strong> $${Number(factura.total).toFixed(2)}</p>
                    <p><strong>% Ganancia museo:</strong> ${factura.porcentaje_ganancia}%</p>
                    <p><strong>Ganancia museo:</strong> $${Number(factura.ganancia_museo).toFixed(2)}</p>
                `;
                document.getElementById('modalTitulo').innerText = `Factura #${factura.factura_id}`;
                document.getElementById('modalFactura').style.display = 'flex';
            } catch (error) {
                alert('Error al cargar detalle: ' + error.message);
            }
        }

        function cerrarModal() {
            document.getElementById('modalFactura').style.display = 'none';
        }

        // Cargar facturas al iniciar
        cargarFacturas();

        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };

        // Cerrar modal si se hace clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('modalFactura');
            if (event.target === modal) {
                cerrarModal();
            }
        };
    </script>
</body>
</html>
