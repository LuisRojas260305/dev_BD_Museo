<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Empleados</title>
    <style>
        /* mismos estilos */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#ecf0f1; }
        header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .Titulo {
            text-decoration: none;
            color: white;
        }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:800px; margin:2rem auto; padding:0 2rem; }
        h2 { color:#2c3e50; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; display:inline-block; margin:0.5rem 0; }
        .btn-danger { background:#e74c3c; }
        .btn-success { background:#27ae60; }
        table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        .form-container { background:white; padding:2rem; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:2rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input { width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        .hidden { display:none; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a class="Titulo" href="admin-dashboard.html"><h1>🎨 Admin - Empleados</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Gestión de Empleados</h2>
        <button class="btn btn-success" onclick="mostrarFormulario()">Nuevo Empleado</button>
        <div id="formContainer" class="form-container hidden">
            <h3 id="formTitle">Nuevo Empleado</h3>
            <form id="empleadoForm">
                <input type="hidden" id="empleadoId">
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="login">Login</label>
                    <input type="text" id="login" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="text" id="password" required>
                </div>
                <div class="form-group">
                    <label for="rol">Rol</label>
                    <select id="rol">
                        <option value="administrador">Administrador</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success">Guardar</button>
                <button type="button" class="btn btn-danger" onclick="cancelarFormulario()">Cancelar</button>
            </form>
        </div>
        <div id="empleadosList">
            <table>
                <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Login</th><th>Rol</th><th>Acciones</th></tr></thead>
                <tbody id="tablaEmpleados"></tbody>
            </table>
        </div>
    </div>
    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script src="../js/auth.js"></script>
    <script>
        //const API_BASE = window.API_BASE || 'http://localhost:3000/api';

        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = 'index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        let empleados = [];
        const tbody = document.getElementById('tablaEmpleados');
        const formContainer = document.getElementById('formContainer');
        const empleadoForm = document.getElementById('empleadoForm');
        const formTitle = document.getElementById('formTitle');
        let editId = null;

        async function cargarEmpleados() {
            try {
                const res = await authFetch(`${API_BASE}/usuarios?tipo=administrador`); // Ajusta según backend
                if (!res.ok) throw new Error('Error al cargar empleados');
                empleados = await res.json();
                renderEmpleados();
            } catch (error) {
                console.error(error);
                alert('No se pudieron cargar los empleados');
            }
        }

        function renderEmpleados() {
            tbody.innerHTML = '';
            empleados.forEach(e => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${e.usuario_id}</td>
                    <td>${e.nombre}</td>
                    <td>${e.email}</td>
                    <td>${e.login}</td>
                    <td>${e.tipo}</td>
                    <td>
                        <button class="btn" onclick="editarEmpleado(${e.usuario_id})">Editar</button>
                        <button class="btn btn-danger" onclick="eliminarEmpleado(${e.usuario_id})">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function mostrarFormulario(empleado = null) {
            formContainer.classList.remove('hidden');
            if (empleado) {
                formTitle.innerText = 'Editar Empleado';
                document.getElementById('empleadoId').value = empleado.usuario_id;
                document.getElementById('nombre').value = empleado.nombre;
                document.getElementById('email').value = empleado.email;
                document.getElementById('login').value = empleado.login;
                document.getElementById('password').value = empleado.password || '';
                editId = empleado.usuario_id;
            } else {
                formTitle.innerText = 'Nuevo Empleado';
                empleadoForm.reset();
                document.getElementById('empleadoId').value = '';
                editId = null;
            }
        }

        function cancelarFormulario() {
            formContainer.classList.add('hidden');
        }

        empleadoForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const empleadoData = {
                nombre: document.getElementById('nombre').value,
                email: document.getElementById('email').value,
                login: document.getElementById('login').value,
                password: document.getElementById('password').value,
                tipo: 'administrador'
            };

            try {
                let url = `${API_BASE}/usuarios`;
                let method = 'POST';
                if (editId) {
                    url += `/${editId}`;
                    method = 'PUT';
                }
                const res = await authFetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(empleadoData)
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Error al guardar');
                }
                alert(editId ? 'Empleado actualizado' : 'Empleado creado');
                cancelarFormulario();
                cargarEmpleados();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        window.editarEmpleado = async function(id) {
            try {
                const res = await authFetch(`${API_BASE}/usuarios/${id}`);
                if (!res.ok) throw new Error('No se pudo obtener el empleado');
                const empleado = await res.json();
                mostrarFormulario(empleado);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.eliminarEmpleado = async function(id) {
            if (!confirm('¿Eliminar empleado?')) return;
            try {
                const res = await authFetch(`${API_BASE}/usuarios/${id}`, { method: 'DELETE' });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error);
                }
                alert('Empleado eliminado');
                cargarEmpleados();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };

        cargarEmpleados();
    </script>
</body>
</html>
