<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Activar Membresía - Museo de Arte</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f5f5f5; }
        header { background-color: #2c3e50; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 1rem; padding: 0.5rem 1rem; border-radius: 4px; background-color: #e67e22; }
        .container { max-width: 550px; margin: 2rem auto; background-color: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2, h3 { color: #2c3e50; margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .form-group { margin-bottom: 1.5rem; padding: 10px; border: 1px solid #fafafa; border-radius: 8px; background: #fdfdfd; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; margin-top: 5px; }
        .btn-pagar { background-color: #27ae60; color: white; border: none; padding: 1rem; font-size: 1.2rem; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 1rem; }
        .btn-pagar:hover { background-color: #2ecc71; }
        .error { color: #e74c3c; font-weight: bold; margin-top: 10px; text-align: center; }
        .Nav{
            text-decoration: none;
            color: whitesmoke;
        }
    </style>
</head>
<body>
    <header>
        <h1><a class="Nav" href="index.html">🎨 Museo de Arte</a></h1>
        <div class="nav-links">
            <a href="perfil.html">Mi Perfil</a>
            <a href="#" onclick="logout()">Cerrar Sesión</a>
        </div>
    </header>

    <div class="container">
        <h2>Activar Membresía ($10)</h2>
        <form id="membresiaForm">
            <h3>Datos de Pago</h3>
            <div class="form-group">
                <label>Número de Tarjeta</label>
                <input type="text" id="tarjeta_numero" placeholder="0000 0000 0000 0000" required>
            </div>
            <div class="form-group">
                <label>Nombre en la Tarjeta</label>
                <input type="text" id="tarjeta_nombre" required>
            </div>

            <h3>Seguridad de la Cuenta</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 15px;">Selecciona 3 preguntas diferentes. Las necesitarás para recuperar tu acceso.</p>
            
            <div id="preguntasContainer">
                </div>

            <button type="submit" class="btn-pagar">Confirmar Pago y Activar</button>
            <p class="error" id="errorMsg"></p>
        </form>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        let preguntasData = [];

        async function cargarPreguntas() {
            try {
                const response = await fetch(`${API_BASE}/preguntas-seguridad`);
                preguntasData = await response.json();
                
                const container = document.getElementById('preguntasContainer');
                container.innerHTML = '';

                for (let i = 1; i <= 3; i++) {
                    const div = document.createElement('div');
                    div.className = 'form-group';
                    div.innerHTML = `
                        <label>Pregunta #${i}</label>
                        <select id="pregunta${i}" class="p-select" required onchange="validarUnicas(this)">
                            <option value="">-- Selecciona una pregunta --</option>
                        </select>
                        <input type="text" id="respuesta${i}" placeholder="Tu respuesta..." required>
                    `;
                    container.appendChild(div);

                    const select = document.getElementById(`pregunta${i}`);
                    preguntasData.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.pregunta_id;
                        opt.textContent = p.pregunta_texto;
                        select.appendChild(opt);
                    });
                }
            } catch (e) {
                document.getElementById('errorMsg').innerText = "Error cargando preguntas del servidor.";
            }
        }

        function validarUnicas(select) {
            const selects = Array.from(document.querySelectorAll('.p-select'));
            const values = selects.map(s => s.value).filter(v => v !== "");
            const hasDuplicates = new Set(values).size !== values.length;

            if (hasDuplicates) {
                alert("No puedes repetir la misma pregunta.");
                select.value = "";
            }
        }

        document.getElementById('membresiaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = '';

            try {
                // 1. Pago
                const resPago = await authFetch(`${API_BASE}/usuarios/membresia`, {
                    method: 'POST',
                    body: JSON.stringify({
                        tarjeta_numero: document.getElementById('tarjeta_numero').value,
                        tarjeta_nombre: document.getElementById('tarjeta_nombre').value
                    })
                });
                const dataPago = await resPago.json();
                if (!resPago.ok) throw new Error(dataPago.error);

                // 2. Respuestas
                const respuestas = [];
                for(let i=1; i<=3; i++) {
                    respuestas.push({
                        pregunta_id: document.getElementById(`pregunta${i}`).value,
                        respuesta: document.getElementById(`respuesta${i}`).value
                    });
                }

                const resSeg = await authFetch(`${API_BASE}/usuarios/seguridad`, {
                    method: 'POST',
                    body: JSON.stringify({ respuestas })
                });

                if (resSeg.ok) {
                    alert(`¡Éxito! Tu código de seguridad es: ${dataPago.codigo_seguridad}`);
                    window.location.href = 'perfil.html';
                } else {
                    const errSeg = await resSeg.json();
                    throw new Error(errSeg.error);
                }
            } catch (err) {
                errorMsg.innerText = err.message;
            }
        });

        cargarPreguntas();
    </script>
</body>
</html>
