<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo de Arte Contemporáneo - Artista</title>
    <style>
        /* Estilos reutilizados (similar a detalle.html) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
        }
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .Titulo {
            text-decoration: none;
            color: white;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 400;
        }
        .auth-links a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            transition: background-color 0.3s;
            cursor: pointer;
        }
        .auth-links .login-btn { background-color: #3498db; }
        .auth-links .logout-btn { background-color: #e67e22; }
        .auth-links .register-btn { background-color: #2ecc71; }
        .auth-links a:hover { opacity: 0.8; }
        .back-link {
            margin: 1rem 2rem;
        }
        .back-link a {
            background-color: #192542;
            color: white;
            margin-left: 1rem;
            padding: 0.3rem 1rem;
            border-bottom-left-radius: 30px;
            border-top-left-radius: 30px;
            text-decoration: none;
            font-size: 1.1rem;
        }
        .back-link a:hover {
             box-shadow: #152779 0px 0px 5px;
        }
        .artist-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .artist-header {
            display: flex;
            gap: 2rem;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .artist-photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            background-color: #ddd;
        }
        .artist-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }


        .artist-info h2 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .artist-info p {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 0.5rem;
        }
        .artist-bio {
            margin-top: 2rem;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #444;
        }
        .obras-title {
            font-size: 1.8rem;
            margin: 2rem 0 1rem;
            color: #2c3e50;
        }
        .obras-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        .obra-card {
            background-color: #f9f9f9;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .obra-card:hover {
            transform: translateY(-5px);
        }
        .obra-image {
            height: 150px;
            overflow: hidden;
            background-color: #ccc;
        }
        .obra-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .obra-info {
            padding: 1rem;
        }
        .obra-info h4 {
            margin-bottom: 0.3rem;
            color: #2c3e50;
        }
        .obra-info p {
            color: #27ae60;
            font-weight: bold;
        }
        .obra-info a {
            text-decoration: none;
            color: inherit;
        }
        .not-found {
            text-align: center;
            padding: 3rem;
            font-size: 1.5rem;
            color: #777;
        }

        .a-obras{
            text-decoration: none;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1><a class="Titulo" href="../index.html">🎨 Museo de Arte Contemporáneo</a></h1>
        </div>
        <div class="auth-links" id="authLinks"></div>
    </header>

    <div class="back-link">
        <a href="../index.html">&larr; Volver al catálogo</a>
    </div>

    <main id="artistMain" class="artist-container">
        <!-- Se llenará dinámicamente -->
    </main>

    <footer>
        <p>&copy; 2026 Museo de Arte Contemporáneo - Proyecto Final</p>
    </footer>
    <script src="../../js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const artistaId = urlParams.get('id');

        async function cargarArtista() {
            try {
                const resArtista = await fetch(`${API_BASE}/artistas/${artistaId}`);
                if (!resArtista.ok) throw new Error('Artista no encontrado');
                const artista = await resArtista.json();

                const resObras = await fetch(`${API_BASE}/obras?artista_id=${artistaId}`);
                const obras = await resObras.json();

                renderizar(artista, obras);
            } catch (error) {
                document.getElementById('artistMain').innerHTML = `<div class="not-found">${error.message}</div>`;
            }
        }

        function renderizar(artista, obras) {
            // URL de la foto del artista usando su ID
            const fotoArtistaUrl = `${API_BASE}/artistas/${artista.artista_id}/foto`;

            let obrasHTML = '';
            obras.forEach(obra => {
                // URL de la foto de la obra usando su ID
                const fotoObraUrl = `${API_BASE}/obras/${obra.obra_id}/foto`;
                obrasHTML += `
                    <div class="obra-card">
                        <a class="a-obras"  href="detalle.html?id=${obra.obra_id}">
                            <div class="obra-image">
                                <img src="${fotoObraUrl}" 
                                    alt="${obra.nombre}"
                                    onerror="this.onerror=null; this.src='https://via.placeholder.com/200x150?text=Sin+imagen';"
                                    style="width:100%; height:100%; object-fit:cover;">
                            </div>
                            <div class="obra-info">
                                <h4>${obra.nombre}</h4>
                                <p>$${Number(obra.precio_venta).toLocaleString()}</p>
                            </div>
                        </a>
                    </div>
                `;
            });

            document.getElementById('artistMain').innerHTML = `
                <div class="artist-header">
                    <div class="artist-photo">
                        <img src="${fotoArtistaUrl}" 
                            alt="${artista.nombre} ${artista.apellido || ''}"
                            onerror="this.onerror=null; this.src='https://via.placeholder.com/200';"
                            style="width:100%; height:100%; object-fit:cover; border-radius:50%;">
                    </div>
                    <div class="artist-info">
                        <h2>${artista.nombre} ${artista.apellido || ''}</h2>
                        <p><strong>Nacionalidad:</strong> ${artista.nacionalidad_nombre || 'Desconocida'}</p>
                        <p><strong>Fecha de nacimiento:</strong> ${artista.fecha_nacimiento || 'Desconocida'}</p>
                    </div>
                </div>
                <div class="artist-bio">
                    <h3>Biografía</h3>
                    <p>${artista.biografia || 'Sin biografía disponible.'}</p>
                </div>
                <h3 class="obras-title">Obras de ${artista.nombre}</h3>
                <div class="obras-grid">${obrasHTML || '<p>No hay obras de este artista.</p>'}</div>
            `;
        }
        cargarArtista();
    </script>
</body>
</html>
