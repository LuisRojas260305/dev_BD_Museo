<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Compradores</title>
    <style>
        /* mismos estilos */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#ecf0f1; }
        header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .Titulo {
            text-decoration: none;
            color: white;
        }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:1200px; margin:2rem auto; padding:0 2rem; }
        h2 { color:#2c3e50; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; display:inline-block; margin:0.5rem 0; }
        .btn-danger { background:#e74c3c; }
        table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; }
        .modal-content { background:white; padding:2rem; border-radius:8px; max-width:500px; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Titulo" href="admin-dashboard.html">🎨 Admin - Compradores</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Gestión de Compradores</h2>
        <div id="compradoresList">
            <table>
                <thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Membresía</th><th>Acciones</th></tr></thead>
                <tbody id="tablaCompradores"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal para ver detalles -->
    <div id="detalleModal" class="modal">
        <div class="modal-content">
            <h3>Detalles del Comprador</h3>
            <div id="detalleInfo"></div>
            <button class="btn" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script src="../js/auth.js"></script>
    <script>
        //const API_BASE = window.API_BASE || 'http://localhost:3000/api';

        // Verificar admin
        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = 'index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        let compradores = [];

        async function cargarCompradores() {
            try {
                const res = await authFetch(`${API_BASE}/usuarios?tipo=miembro`); // Ajusta según tu backend
                if (!res.ok) throw new Error('Error al cargar compradores');
                compradores = await res.json();
                renderCompradores();
            } catch (error) {
                console.error(error);
                alert('No se pudieron cargar los compradores');
            }
        }

        function renderCompradores() {
            const tbody = document.getElementById('tablaCompradores');
            tbody.innerHTML = '';
            compradores.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${c.usuario_id}</td>
                    <td>${c.nombre}</td>
                    <td>${c.email}</td>
                    <td>${c.telefono || ''}</td>
                    <td>${c.tipo === 'miembro' ? 'Sí' : 'No'}</td>
                    <td>
                        <button class="btn" onclick="verDetalle(${c.usuario_id})">Ver</button>
                        <button class="btn btn-danger" onclick="desactivarComprador(${c.usuario_id})">Desactivar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.verDetalle = async function(id) {
            try {
                const res = await authFetch(`${API_BASE}/usuarios/${id}`);
                if (!res.ok) throw new Error('No se pudo obtener el detalle');
                const comprador = await res.json();
                const info = `
                    <p><strong>ID:</strong> ${comprador.usuario_id}</p>
                    <p><strong>Nombre:</strong> ${comprador.nombre}</p>
                    <p><strong>Email:</strong> ${comprador.email}</p>
                    <p><strong>Teléfono:</strong> ${comprador.telefono || ''}</p>
                    <p><strong>Dirección:</strong> ${comprador.direccion || ''}</p>
                    <p><strong>Tipo:</strong> ${comprador.tipo}</p>
                    <p><strong>Código seguridad:</strong> ${comprador.codigo_seguridad || 'N/A'}</p>
                    <p><strong>Fecha registro:</strong> ${new Date(comprador.fecha_registro).toLocaleDateString()}</p>
                `;
                document.getElementById('detalleInfo').innerHTML = info;
                document.getElementById('detalleModal').style.display = 'flex';
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.cerrarModal = function() {
            document.getElementById('detalleModal').style.display = 'none';
        };

        window.desactivarComprador = async function(id) {
            if (!confirm('¿Desactivar este comprador? (cambiará a tipo "usuario")')) return;
            try {
                const res = await authFetch(`${API_BASE}/usuarios/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo: 'usuario' }) // Desactivar membresía
                });
                if (!res.ok) throw new Error('Error al desactivar');
                alert('Comprador desactivado');
                cargarCompradores();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };

        cargarCompradores();
    </script>
</body>
</html>
