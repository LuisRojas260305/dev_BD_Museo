<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Resumen Facturación</title>
    <style>
        /* mismos estilos que consulta */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#ecf0f1; }
        header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .Titulo {
            text-decoration: none;
            color: white;
        }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:1000px; margin:2rem auto; padding:0 2rem; }
        h2 { color:#2c3e50; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input { padding:0.5rem; border:1px solid #ccc; border-radius:4px; width:200px; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; }
        table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-top:1rem; }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Titulo" href="admin-dashboard.html">🎨 Admin - Resumen Facturación</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Resumen de Facturación por Período</h2>
        <form id="periodoForm">
            <div class="form-group">
                <label for="fechaInicio">Fecha inicio</label>
                <input type="date" id="fechaInicio" required>
            </div>
            <div class="form-group">
                <label for="fechaFin">Fecha fin</label>
                <input type="date" id="fechaFin" required>
            </div>
            <button type="submit" class="btn">Consultar</button>
        </form>
        <div id="resultado">
            <table>
                <thead><tr><th>Factura</th><th>Fecha</th><th>Precio obra</th><th>% Ganancia</th><th>Ganancia $</th><th>Total recaudado</th></tr></thead>
                <tbody id="tablaResumen"></tbody>
                <tfoot id="totales" style="font-weight:bold; background:#ecf0f1;"></tfoot>
            </table>
        </div>
    </div>
    <footer><p>&copy; 2026 Museo de Arte Contemporáneo</p></footer>

    <script src="../js/auth.js"></script>
    <script>
        //const API_BASE = window.API_BASE || 'http://localhost:3000/api';

        (function() {
            const user = getUser();
            if (!user || user.tipo !== 'administrador') {
                alert('Acceso no autorizado');
                window.location.href = 'index.html';
            }
            document.getElementById('userEmail').innerText = user.email;
        })();

        document.getElementById('periodoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fechaInicio = document.getElementById('fechaInicio').value;
            const fechaFin = document.getElementById('fechaFin').value;

            if (!fechaInicio || !fechaFin) {
                alert('Debe seleccionar ambas fechas');
                return;
            }

            const params = new URLSearchParams({ desde: fechaInicio, hasta: fechaFin });

            try {
                const res = await authFetch(`${API_BASE}/ventas?${params}`);
                if (!res.ok) throw new Error('Error al obtener ventas');
                const ventas = await res.json();
                renderResumen(ventas);
            } catch (error) {
                console.error(error);
                document.getElementById('tablaResumen').innerHTML = `<tr><td colspan="6" style="color:#e74c3c;">Error: ${error.message}</td></tr>`;
                document.getElementById('totales').innerHTML = '';
            }
        });

        function renderResumen(ventas) {
            const tbody = document.getElementById('tablaResumen');
            tbody.innerHTML = '';
            let totalGanancia = 0, totalRecaudado = 0;

            if (ventas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">No hay facturas en el período</td></tr>';
                document.getElementById('totales').innerHTML = '';
                return;
            }

            ventas.forEach(v => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${v.venta_id || v.id}</td>
                    <td>${new Date(v.fecha).toLocaleDateString()}</td>
                    <td>$${Number(v.precio_venta).toFixed(2)}</td>
                    <td>${v.porcentaje_ganancia}%</td>
                    <td>$${Number(v.ganancia_museo).toFixed(2)}</td>
                    <td>$${Number(v.total).toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
                totalGanancia += Number(v.ganancia_museo);
                totalRecaudado += Number(v.total);
            });

            document.getElementById('totales').innerHTML = `
                <tr><td colspan="4" style="text-align:right;">Totales:</td><td>$${totalGanancia.toFixed(2)}</td><td>$${totalRecaudado.toFixed(2)}</td></tr>
            `;
        }

        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
