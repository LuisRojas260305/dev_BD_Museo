<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - Museo de Arte</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f5f5f5; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .info-card { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .codigo-box { font-family: monospace; background: #eee; padding: 5px 10px; border-radius: 4px; }
        .section { margin-top: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; }
        h3 { color: #2c3e50; margin-bottom: 15px; border-bottom: 2px solid #3498db; display: inline-block; }
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-green { background: #27ae60; } .btn-blue { background: #3498db; } .btn-orange { background: #e67e22; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .small-note { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        .error { color: #e74c3c; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎨 Mi Perfil</h2>
        <a href="index.html">Volver al inicio</a>
        
        <div id="userData"></div>

        <!-- Sección para activar membresía (visible solo para usuarios tipo 'usuario') -->
        <div id="activarMembresiaSection" class="section" style="display: none;">
            <h3>Activar Membresía</h3>
            <p>Conviértete en miembro por solo $10 y accede a beneficios exclusivos.</p>
            <button class="btn-green" onclick="abrirModalMembresia()">Activar Membresía ($10)</button>
        </div>

        <div class="section">
            <h3>Cambiar Contraseña</h3>
            <input type="password" id="pass1" placeholder="Nueva Contraseña">
            <input type="password" id="pass2" placeholder="Repite la Nueva Contraseña">
            <button class="btn-green" onclick="cambiarPassword()">Actualizar Contraseña</button>
        </div>

        <div class="section">
            <h3>Regenerar Código de Seguridad</h3>
            <p style="font-size:0.9rem; color:#666; margin-bottom:10px;">Responde a tus preguntas actuales para generar un nuevo código.</p>
            <button class="btn-orange" onclick="abrirModalRegenerar()">Generar Nuevo Código</button>
        </div>

        <div class="section">
            <h3>Cambiar Preguntas de Seguridad</h3>
            <button class="btn-blue" onclick="abrirModalPreguntas()">Configurar Nuevas Preguntas</button>
        </div>
    </div>

    <!-- Modal genérico para todas las acciones -->
    <div id="miModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Título Modal</h3>
            <div id="modalBody"></div>
            <button class="btn-green" id="btnAccionModal" style="margin-top: 15px;">Confirmar</button>
            <button style="background: #95a5a6;" onclick="cerrarModal()">Cancelar</button>
            <p class="error" id="modalError"></p>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        let codigoReal = "";
        let preguntasUsuario = []; // Las preguntas actuales del usuario
        let todasLasPreguntas = []; // Todas las preguntas disponibles

        async function cargarPerfil() {
            const res = await authFetch(`${API_BASE}/usuarios/perfil`);
            const user = await res.json();
            if (res.ok) {
                codigoReal = user.codigo_seguridad || "N/A";
                let codigoHTML = '';
                if (user.tipo === 'miembro' || user.tipo === 'administrador') {
                    codigoHTML = `
                        <div class="info-card">
                            <strong>Código:</strong> 
                            <div>
                                <span id="txtCodigo" class="codigo-box">********</span>
                                <button onclick="toggleCodigo()" style="width:auto; background:#34495e; padding:5px;">👁️</button>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('userData').innerHTML = `
                    <div class="info-card"><strong>Nombre:</strong> <span>${user.nombre}</span></div>
                    <div class="info-card"><strong>Email:</strong> <span>${user.email}</span></div>
                    <div class="info-card"><strong>Tipo:</strong> <span>${user.tipo}</span></div>
                    ${codigoHTML}
                `;

                // Mostrar u ocultar sección de activar membresía
                const activarSection = document.getElementById('activarMembresiaSection');
                if (user.tipo === 'usuario') {
                    activarSection.style.display = 'block';
                } else {
                    activarSection.style.display = 'none';
                }
            }
        }

        function toggleCodigo() {
            const span = document.getElementById('txtCodigo');
            span.innerText = span.innerText === "********" ? codigoReal : "********";
        }

        async function cambiarPassword() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            if(!p1 || p1 !== p2) return alert("Las contraseñas no coinciden o están vacías");

            const res = await authFetch(`${API_BASE}/usuarios/cambiar-pass-perfil`, {
                method: 'POST', body: JSON.stringify({ nuevaPassword: p1 })
            });
            if(res.ok) {
                alert("Contraseña cambiada con éxito");
                document.getElementById('pass1').value = '';
                document.getElementById('pass2').value = '';
            } else { alert("Error al cambiar contraseña"); }
        }

        function cerrarModal() { 
            document.getElementById('miModal').style.display = 'none';
            document.getElementById('modalError').innerText = '';
        }

        // --- ACTIVAR MEMBRESÍA ---
        async function abrirModalMembresia() {
            // Cargar todas las preguntas
            const res = await fetch(`${API_BASE}/preguntas-seguridad`);
            todasLasPreguntas = await res.json();

            document.getElementById('modalTitle').innerText = 'Activar Membresía';
            let html = `
                <h4>Datos de pago</h4>
                <div class="form-group">
                    <label>Número de tarjeta</label>
                    <input type="text" id="tarjeta_numero" placeholder="0000 0000 0000 0000" required>
                </div>
                <div class="form-group">
                    <label>Nombre en la tarjeta</label>
                    <input type="text" id="tarjeta_nombre" required>
                </div>
                <div class="form-group">
                    <label>Fecha de expiración (MM/AA)</label>
                    <input type="text" id="tarjeta_expiracion" placeholder="MM/AA" required>
                </div>
                <h4>Preguntas de seguridad</h4>
                <p class="small-note">Selecciona 3 preguntas diferentes. Las necesitarás para recuperar tu cuenta.</p>
            `;
            for (let i = 1; i <= 3; i++) {
                html += `
                    <div class="form-group">
                        <label>Pregunta ${i}</label>
                        <select id="pregunta${i}" class="p-select" required>
                            <option value="">-- Selecciona --</option>
                            ${todasLasPreguntas.map(p => `<option value="${p.pregunta_id}">${p.pregunta_texto}</option>`).join('')}
                        </select>
                        <input type="text" id="respuesta${i}" placeholder="Tu respuesta" required>
                    </div>
                `;
            }
            document.getElementById('modalBody').innerHTML = html;
            
            // Añadir evento para validar que las preguntas sean únicas
            document.querySelectorAll('.p-select').forEach(select => {
                select.addEventListener('change', validarUnicas);
            });

            const btn = document.getElementById('btnAccionModal');
            btn.innerText = 'Pagar y Activar';
            btn.onclick = ejecutarActivacionMembresia;
            document.getElementById('miModal').style.display = 'flex';
        }

        function validarUnicas() {
            const selects = Array.from(document.querySelectorAll('.p-select'));
            const values = selects.map(s => s.value).filter(v => v !== "");
            const hasDuplicates = new Set(values).size !== values.length;
            if (hasDuplicates) {
                document.getElementById('modalError').innerText = 'No puedes repetir la misma pregunta.';
            } else {
                document.getElementById('modalError').innerText = '';
            }
        }

        async function ejecutarActivacionMembresia() {
            const errorMsg = document.getElementById('modalError');
            errorMsg.innerText = '';

            // Validar que las preguntas sean distintas
            const selects = Array.from(document.querySelectorAll('.p-select'));
            const values = selects.map(s => s.value);
            if (new Set(values).size !== 3 || values.includes("")) {
                errorMsg.innerText = 'Debes seleccionar 3 preguntas diferentes.';
                return;
            }

            // Datos de tarjeta
            const membresiaData = {
                tarjeta_numero: document.getElementById('tarjeta_numero').value,
                tarjeta_nombre: document.getElementById('tarjeta_nombre').value,
                tarjeta_expiracion: document.getElementById('tarjeta_expiracion').value
            };

            try {
                // 1. Pagar membresía
                const resPago = await authFetch(`${API_BASE}/usuarios/membresia`, {
                    method: 'POST',
                    body: JSON.stringify(membresiaData)
                });
                const dataPago = await resPago.json();
                if (!resPago.ok) throw new Error(dataPago.error);

                // 2. Guardar respuestas
                const respuestas = [];
                for (let i = 1; i <= 3; i++) {
                    respuestas.push({
                        pregunta_id: document.getElementById(`pregunta${i}`).value,
                        respuesta: document.getElementById(`respuesta${i}`).value
                    });
                }
                const resSeg = await authFetch(`${API_BASE}/usuarios/seguridad`, {
                    method: 'POST',
                    body: JSON.stringify({ respuestas })
                });
                if (!resSeg.ok) {
                    const errSeg = await resSeg.json();
                    throw new Error(errSeg.error);
                }

                alert(`¡Membresía activada! Tu código de seguridad es: ${dataPago.codigo_seguridad}. Guárdalo bien.`);
                cerrarModal();
                cargarPerfil(); // Actualizar la vista
            } catch (err) {
                errorMsg.innerText = err.message;
            }
        }

        // --- REGENERAR CÓDIGO --- (sin cambios, pero asegurar que usa preguntasUsuario)
        async function abrirModalRegenerar() {
            const res = await authFetch(`${API_BASE}/usuarios/mis-preguntas`);
            preguntasUsuario = await res.json();

            document.getElementById('modalTitle').innerText = 'Regenerar Código';
            let html = '<p>Responde tus preguntas de seguridad:</p>';
            preguntasUsuario.forEach((p, i) => {
                html += `<label><strong>${p.pregunta_texto}</strong></label>
                         <input type="text" id="r_ans${i}" data-id="${p.pregunta_id}">`;
            });
            document.getElementById('modalBody').innerHTML = html;
            
            const btn = document.getElementById('btnAccionModal');
            btn.innerText = 'Regenerar Código';
            btn.onclick = ejecutarRegenerarCodigo;
            document.getElementById('miModal').style.display = 'flex';
        }

        async function ejecutarRegenerarCodigo() {
            const respuestas = preguntasUsuario.map((p, i) => ({
                pregunta_id: document.getElementById(`r_ans${i}`).dataset.id,
                respuesta: document.getElementById(`r_ans${i}`).value
            }));

            const res = await authFetch(`${API_BASE}/usuarios/regenerar-codigo`, {
                method: 'POST', body: JSON.stringify({ respuestas })
            });
            const data = await res.json();
            if(res.ok) {
                alert(`¡Éxito! Tu nuevo código es: ${data.codigo_seguridad}`);
                codigoReal = data.codigo_seguridad;
                cerrarModal();
                toggleCodigo(); // Mostrarlo
            } else { alert(data.error); }
        }

        // --- CAMBIAR PREGUNTAS --- (sin cambios)
        async function abrirModalPreguntas() {
            const res = await fetch(`${API_BASE}/preguntas-seguridad`);
            todasLasPreguntas = await res.json();

            document.getElementById('modalTitle').innerText = 'Cambiar Preguntas';
            let html = `<label><strong>Contraseña Actual:</strong></label>
                        <input type="password" id="passConfirm" required>`;
            
            for(let i=1; i<=3; i++) {
                html += `<select id="n_pre${i}" class="n-select">
                            <option value="">Selecciona pregunta ${i}</option>`;
                todasLasPreguntas.forEach(p => {
                    html += `<option value="${p.pregunta_id}">${p.pregunta_texto}</option>`;
                });
                html += `</select><input type="text" id="n_res${i}" placeholder="Respuesta ${i}">`;
            }
            
            document.getElementById('modalBody').innerHTML = html;
            const btn = document.getElementById('btnAccionModal');
            btn.innerText = 'Guardar Nuevas Preguntas';
            btn.onclick = ejecutarCambioPreguntas;
            document.getElementById('miModal').style.display = 'flex';
        }

        async function ejecutarCambioPreguntas() {
            const passwordActual = document.getElementById('passConfirm').value;
            const selects = Array.from(document.querySelectorAll('.n-select'));
            const ids = selects.map(s => s.value);
            
            if(new Set(ids).size !== 3 || ids.includes("")) return alert("Selecciona 3 preguntas diferentes");

            const nuevasRespuestas = [];
            for(let i=1; i<=3; i++) {
                nuevasRespuestas.push({
                    pregunta_id: document.getElementById(`n_pre${i}`).value,
                    respuesta: document.getElementById(`n_res${i}`).value
                });
            }

            const res = await authFetch(`${API_BASE}/usuarios/actualizar-preguntas`, {
                method: 'POST', body: JSON.stringify({ passwordActual, nuevasRespuestas })
            });
            const data = await res.json();
            if(res.ok) {
                alert("Preguntas actualizadas correctamente");
                cerrarModal();
            } else { alert(data.error); }
        }

        cargarPerfil();
    </script>
</body>
</html>
