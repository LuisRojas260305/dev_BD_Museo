<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Artistas</title>
    <style>
        /* mismos estilos que gestion-obras, se pueden reutilizar */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
        body { background:#ecf0f1; }
        header { background:#2c3e50; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .Titulo {
            text-decoration: none;
            color: white;
        }
        .logo h1 { font-size:1.5rem; }
        .user-info { display:flex; align-items:center; gap:1rem; }
        .logout-btn { background:#e67e22; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; }
        .container { max-width:1200px; margin:2rem auto; padding:0 2rem; }
        h2 { color:#2c3e50; margin-bottom:1rem; }
        .btn { background:#3498db; color:white; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; text-decoration:none; display:inline-block; margin:0.5rem 0; }
        .btn-danger { background:#e74c3c; }
        .btn-success { background:#27ae60; }
        table { width:100%; border-collapse:collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding:1rem; text-align:left; border-bottom:1px solid #ddd; }
        th { background:#34495e; color:white; }
        .form-container { background:white; padding:2rem; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:2rem; }
        .form-group { margin-bottom:1rem; }
        label { display:block; margin-bottom:0.3rem; font-weight:600; }
        input, select, textarea { width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        .hidden { display:none; }
        footer { background:#2c3e50; color:white; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><a class="Titulo" href="index.html">🎨 Admin - Artistas</a></h1></div>
        <div class="user-info"><span id="userEmail"></span><a href="#" class="logout-btn" onclick="logout()">Cerrar sesión</a></div>
    </header>
    <div class="container">
        <h2>Gestión de Artistas</h2>
        <button class="btn btn-success" onclick="mostrarFormulario()">Nuevo Artista</button>
        <div id="formContainer" class="form-container hidden">
            <h3 id="formTitle">Nuevo Artista</h3>
            <form id="artistaForm">
                <input type="hidden" id="artistaId">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label for="nacionalidad">Nacionalidad</label>
                    <input type="text" id="nacionalidad" required>
                </div>
                <div class="form-group">
                    <label for="fechaNacimiento">Fecha de nacimiento</label>
                    <input type="text" id="fechaNacimiento" placeholder="Ej: 1863" required>
                </div>
                <div class="form-group">
                    <label for="biografia">Biografía</label>
                    <textarea id="biografia" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label for="foto">URL de foto</label>
                    <input type="url" id="foto">
                </div>
                <button type="submit" class="btn btn-success">Guardar</button>
                <button type="button" class="btn btn-danger" onclick="cancelarFormulario()">Cancelar</button>
            </form>
        </div>
        <div id="artistasList">
            <table>
                <thead><tr><th>ID</th><th>Nombre</th><th>Nacionalidad</th><th>Nacimiento</th><th>Acciones</th></tr></thead>
                <tbody id="tablaArtistas"></tbody>
            </table>
        </div>
    </div>
    <footer><p>&copy; 2025 Museo de Arte Contemporáneo</p></footer>

    <script>
        // Verificar admin
        (function() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if (currentUser.role !== 'admin') { alert('Acceso no autorizado'); window.location.href='index.html'; }
            document.getElementById('userEmail').innerText = currentUser.email;
        })();

        let artistas = JSON.parse(localStorage.getItem('artistas') || '[]');
        if (artistas.length === 0) {
            artistas = [
                { id:1, nombre:"Edvard Munch", nacionalidad:"Noruega", fechaNacimiento:"1863", biografia:"...", foto:"https://picsum.photos/id/102/200" },
                { id:2, nombre:"Miguel Ángel", nacionalidad:"Italiana", fechaNacimiento:"1475", biografia:"...", foto:"https://picsum.photos/id/1040/200" }
            ];
            localStorage.setItem('artistas', JSON.stringify(artistas));
        }

        const tbody = document.getElementById('tablaArtistas');
        const formContainer = document.getElementById('formContainer');
        const artistaForm = document.getElementById('artistaForm');
        const formTitle = document.getElementById('formTitle');
        let editId = null;

        function cargarArtistas() {
            tbody.innerHTML = '';
            artistas.forEach(a => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${a.id}</td>
                    <td>${a.nombre}</td>
                    <td>${a.nacionalidad}</td>
                    <td>${a.fechaNacimiento}</td>
                    <td>
                        <button class="btn" onclick="editarArtista(${a.id})">Editar</button>
                        <button class="btn btn-danger" onclick="eliminarArtista(${a.id})">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function mostrarFormulario(artista = null) {
            formContainer.classList.remove('hidden');
            if (artista) {
                formTitle.innerText = 'Editar Artista';
                document.getElementById('artistaId').value = artista.id;
                document.getElementById('nombre').value = artista.nombre;
                document.getElementById('nacionalidad').value = artista.nacionalidad;
                document.getElementById('fechaNacimiento').value = artista.fechaNacimiento;
                document.getElementById('biografia').value = artista.biografia || '';
                document.getElementById('foto').value = artista.foto || '';
                editId = artista.id;
            } else {
                formTitle.innerText = 'Nuevo Artista';
                artistaForm.reset();
                document.getElementById('artistaId').value = '';
                editId = null;
            }
        }

        function cancelarFormulario() {
            formContainer.classList.add('hidden');
        }

        artistaForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const nuevoArtista = {
                id: editId || Date.now(),
                nombre: document.getElementById('nombre').value,
                nacionalidad: document.getElementById('nacionalidad').value,
                fechaNacimiento: document.getElementById('fechaNacimiento').value,
                biografia: document.getElementById('biografia').value,
                foto: document.getElementById('foto').value
            };
            if (editId) {
                const index = artistas.findIndex(a => a.id === editId);
                if (index !== -1) artistas[index] = nuevoArtista;
            } else {
                artistas.push(nuevoArtista);
            }
            localStorage.setItem('artistas', JSON.stringify(artistas));
            cargarArtistas();
            cancelarFormulario();
        });

        window.editarArtista = function(id) {
            const artista = artistas.find(a => a.id === id);
            if (artista) mostrarFormulario(artista);
        };

        window.eliminarArtista = function(id) {
            if (confirm('¿Eliminar artista?')) {
                artistas = artistas.filter(a => a.id !== id);
                localStorage.setItem('artistas', JSON.stringify(artistas));
                cargarArtistas();
            }
        };

        window.logout = function() { localStorage.removeItem('loggedIn'); localStorage.removeItem('currentUser'); window.location.href='index.html'; };

        cargarArtistas();
    </script>
</body>
</html>
