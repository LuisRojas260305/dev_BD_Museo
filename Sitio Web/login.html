<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo de Arte Contemporáneo - Iniciar Sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f5f5f5;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 400;
        }
        .auth-links a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            background-color: #2ecc71;
        }
        .container {
            max-width: 400px;
            margin: 3rem auto;
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-login {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0.8rem;
            font-size: 1.1rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .btn-login:hover {
            background-color: #2980b9;
        }
        .links {
            margin-top: 1rem;
            text-align: center;
        }
        .links a {
            color: #3498db;
            text-decoration: none;
            margin: 0 0.5rem;
        }
        .links a:hover {
            text-decoration: underline;
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>🎨 Museo de Arte Contemporáneo</h1>
        </div>
        <div class="auth-links">
            <a href="registro.html">Registrarse</a>
        </div>
    </header>

    <div class="container">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        <div class="links">
            <a href="recuperar.html">¿Olvidaste tu código?</a>
            <a href="index.html">Volver al catálogo</a>
        </div>
        <p style="margin-top:1rem; font-size:0.9rem; color:#777;">Admin: admin@museo.com / admin123</p>
        <p style="font-size:0.9rem; color:#777;">Comprador: usar correo registrado y contraseña "password" (simulado)</p>
    </div>

    <footer>
        <p>&copy; 2025 Museo de Arte Contemporáneo</p>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simulación de admin
            if (email === 'admin@museo.com' && password === 'admin123') {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify({ email, role: 'admin' }));
                alert('Bienvenido administrador');
                window.location.href = 'admin-dashboard.html';
                return;
            }

            // Buscar comprador en localStorage
            const compradores = JSON.parse(localStorage.getItem('compradores') || '[]');
            const comprador = compradores.find(c => c.email === email);
            // En un sistema real se verificaría la contraseña hasheada. Aquí simulamos que la contraseña es "password" para el comprador.
            if (comprador && password === 'password') {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify({ email, role: 'comprador', nombre: comprador.nombre }));
                alert('Bienvenido ' + comprador.nombre);
                window.location.href = 'index.html';
            } else {
                alert('Credenciales incorrectas. Para probar, use admin@museo.com/admin123 o un correo registrado con contraseña "password"');
            }
        });
    </script>
</body>
</html>
