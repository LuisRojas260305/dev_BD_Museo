<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo de Arte Contemporáneo - Confirmar Compra</title>
    <style>
        /* Estilos similares a detalle */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f5f5f5;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .Titulo {
            text-decoration: none;
            color: white;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 400;
        }
        .auth-links a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            background-color: #e67e22;
        }
        .container {
            max-width: 600px;
            margin: 2rem auto;
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
        }
        .obra-resumen {
            background-color: #f9f9f9;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .obra-resumen p {
            margin: 0.5rem 0;
            font-size: 1.1rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-confirmar {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .btn-confirmar:hover {
            background-color: #2ecc71;
        }
        .error {
            color: red;
            margin-top: 0.5rem;
        }
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
           <h1><a class="Titulo" href="index.html">🎨 Museo de Arte Contemporáneo</a></h1>
        </div>
        <div class="auth-links">
            <a href="#" onclick="logout()">Cerrar sesión</a>
        </div>
    </header>

    <div class="container" id="container">
        <!-- Se llenará con JS -->
    </div>

    <footer>
        <p>&copy; 2025 Museo de Arte Contemporáneo</p>
    </footer>

    <script>
        // Base de datos de obras (igual que antes)
        const obras = [
            { id:1, nombre:"El Grito", artista:"Edvard Munch", precio:12000, imagen:"https://picsum.photos/id/1015/300/200", status:"Disponible" },
            { id:2, nombre:"David", artista:"Miguel Ángel", precio:25000, imagen:"https://picsum.photos/id/1043/300/200", status:"Disponible" },
            { id:3, nombre:"La noche estrellada", artista:"Vincent van Gogh", precio:35000, imagen:"https://picsum.photos/id/1044/300/200", status:"Disponible" },
            { id:4, nombre:"El pensador", artista:"Auguste Rodin", precio:18000, imagen:"https://picsum.photos/id/107/300/200", status:"Disponible" },
            { id:5, nombre:"Mona Lisa", artista:"Leonardo da Vinci", precio:80000, imagen:"https://picsum.photos/id/1015/300/200", status:"Disponible" },
            { id:6, nombre:"Vasija ceremonial", artista:"María Martínez", precio:4500, imagen:"https://picsum.photos/id/30/300/200", status:"Disponible" },
            { id:7, nombre:"Collar de oro", artista:"Luis Ortega", precio:6200, imagen:"https://picsum.photos/id/26/300/200", status:"Disponible" },
            { id:8, nombre:"Retrato en blanco y negro", artista:"Annie Leibovitz", precio:8900, imagen:"https://picsum.photos/id/100/300/200", status:"Disponible" }
        ];

        // Verificar sesión
        const loggedIn = localStorage.getItem('loggedIn') === 'true';
        if (!loggedIn) {
            alert('Debe iniciar sesión para confirmar una compra');
            window.location.href = 'login.html';
        }

        // Obtener ID de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const obraId = parseInt(urlParams.get('id'));
        const obra = obras.find(o => o.id === obraId);

        const container = document.getElementById('container');

        if (!obra) {
            container.innerHTML = '<h2>Obra no encontrada</h2>';
        } else {
            container.innerHTML = `
                <h2>Confirmar compra</h2>
                <div class="obra-resumen">
                    <p><strong>Obra:</strong> ${obra.nombre}</p>
                    <p><strong>Artista:</strong> ${obra.artista}</p>
                    <p><strong>Precio:</strong> $${obra.precio.toLocaleString()}</p>
                    <p><strong>Estado actual:</strong> ${obra.status}</p>
                </div>
                <form id="confirmForm">
                    <div class="form-group">
                        <label for="codigo">Código de seguridad (enviado a tu correo)</label>
                        <input type="text" id="codigo" required placeholder="Ej: A1B2C3D4">
                    </div>
                    <button type="submit" class="btn-confirmar">Confirmar compra</button>
                    <p class="error" id="errorMsg"></p>
                </form>
            `;

            document.getElementById('confirmForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const codigoIngresado = document.getElementById('codigo').value.trim().toUpperCase();

                // Obtener el comprador actual (simulado: el primer comprador en localStorage)
                const compradores = JSON.parse(localStorage.getItem('compradores') || '[]');
                const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
                const comprador = compradores.find(c => c.email === currentUser.email);

                if (!comprador) {
                    document.getElementById('errorMsg').innerText = 'No se encontró el perfil del comprador.';
                    return;
                }

                if (codigoIngresado === comprador.codigoSeguridad) {
                    // Cambiar estado de la obra a "Reservada"
                    // Obtener obras desde localStorage
                    let obras = JSON.parse(localStorage.getItem('obras') || '[]');
                    // Luego buscar la obra con el ID
                    const obra = obras.find(o => o.id === obraId);

                    obra.status = "Reservada";
                    localStorage.setItem('obras', JSON.stringify(obras));
                } else {
                    document.getElementById('errorMsg').innerText = 'Código incorrecto. Intente nuevamente.';
                }
            });
        }

        function logout() {
            localStorage.removeItem('loggedIn');
            localStorage.removeItem('currentUser');
            alert('Sesión cerrada');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
